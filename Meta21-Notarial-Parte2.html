<script>
const STORE_KEY = 'concurso_meta21_notarial_parte2_v1';   // chave do localStorage deste simulado
const SLUG = STORE_KEY.replace(/^concurso_/,'');   // usado nos nomes dos arquivos de exportação
const QUESTOES = [
  {id:"q1", materia:"Registral — interinidade e remuneração do interino", banca:"Consulplan · TJ-AC · 2023", tipo:'multipla', enunciado:"Eulália é titular de Registro Civil de Pessoas Naturais e, para apoiar o desempenho de suas funções, contratou Eliana e Eloá como escreventes, designando a última para responder pelo serviço em suas ausências e impedimentos. Em 18.10.2022, durante ausência da titular, Eloá praticou pessoalmente ato de interesse próprio que, embora seja seu primo, nunca com ele conviveu em contato íntimo. Em 01.03.2023, Eulália vem a falecer, o que ocasionou a extinção da delegação. Sobre o caso hipotético, levando-se em conta, exclusivamente, as disposições da Lei dos Cartórios, assinale a afirmativa correta.", alternativas:[{letra:"A",texto:"O ato praticado em 18.10.2022 padece de vício, uma vez que se enquadra em hipótese de impedimento quando o ato é praticado em interesse próprio do escrevente."},{letra:"B",texto:"Extinta a delegação e declarado vago o serviço, será designado o substituto mais antigo para responder pelo expediente até a abertura de novo concurso."},{letra:"C",texto:"A remuneração de Eliana pode ser livremente ajustada, enquanto que a remuneração de Eloá deve seguir o disposto na tabela de vencimentos estabelecida pelo Tribunal de Justiça do Acre."},{letra:"D",texto:"Atos praticados por Eloá durante as ausências de Eulália que eventualmente ocasionem danos a terceiros apenas poderão ter a responsabilidade criminal apurada, tendo em vista que a lei prevê a responsabilidade civil somente alcança os atos praticados pessoalmente pelo titular do serviço."}], correta:"A", comentario:"<b>✅ Gabarito: LETRA A</b>.<br><br><b>⚖️ Por quê:</b> a Lei 8.935/94 veda ao escrevente/substituto a prática de atos em <b>interesse próprio</b> (impedimento), pois ninguém pode lavrar ato em que figure como parte interessada — o ato praticado nessas condições padece de vício. O parentesco distante não afasta o impedimento por interesse próprio.<br><br><b>As outras:</b> <b>B)</b> com a extinção da delegação assume o substituto mais antigo, mas a redação desconsidera a designação específica feita pela titular e a disciplina do CNJ. <b>C)</b> a remuneração dos prepostos é ajustada livremente pelo titular, não fixada por tabela do tribunal. <b>D)</b> a responsabilidade civil alcança também os atos dos prepostos, com regresso do titular.<br><br><b>⚠️ Pegadinha:</b> ato em interesse próprio do preposto = impedimento (vício).<br><br><b>📌 Fundamento:</b> arts. 20 a 22 da Lei 8.935/94.<br><br><b>🔁 Revisar:</b> preposto não pratica ato em interesse próprio (impedimento).<br><br><b>☑ Verificação:</b> Norma [arts. 20-22 Lei 8.935/94 ✔] · Tese [N/A — letra de norma]."},
  {id:"q2", materia:"Notarial — disposições gerais (substitutos/escreventes)", banca:"CEBRASPE · TJ-RO · 2025", tipo:'multipla', enunciado:"De acordo com as disposições da Lei dos Notários e Registradores, assinale a opção correta.", alternativas:[{letra:"A",texto:"Foi considerada constitucional pelo STF a previsão da Lei 8.935/94 segundo a qual os servidores públicos que trabalhavam em cartórios privados poderiam ser contratados pelo regime trabalhista comum (CLT), cessando o vínculo com o Estado."},{letra:"B",texto:"Admite-se, mediante autorização do respectivo tribunal de justiça, a instalação de sucursal de serviço notarial ou de registro."},{letra:"C",texto:"Os substitutos poderão, simultaneamente com o oficial de registro, praticar todos os atos que lhe sejam próprios, sem exceção."},{letra:"D",texto:"Somente bacharéis em direito devem ser admitidos nos concursos públicos voltados à delegação para o exercício da atividade notarial e de registro."},{letra:"E",texto:"Em cada serviço notarial ou de registro, haverá número limite de substitutos, escreventes e auxiliares, a critério do respectivo tribunal de justiça."}], correta:"A", comentario:"<b>✅ Gabarito: LETRA A</b>.<br><br><b>⚖️ Por quê:</b> o STF reconheceu a <b>constitucionalidade</b> do regime de transição da Lei 8.935/94 (art. 48 e segs.) que permitiu aos servidores que trabalhavam nas serventias optar pelo regime da CLT, com a cessação do vínculo estatutário, respeitada a opção dos titulares já existentes — não há inconstitucionalidade nessa previsão.<br><br><b>As outras:</b> <b>B)</b> é <b>vedada</b> a instalação de sucursal do serviço notarial e de registro (art. 44, §4º). <b>C)</b> os substitutos praticam os atos do titular, mas há atos personalíssimos — não é “sem exceção”. <b>D)</b> não se exige bacharelado em direito, bastando notório saber e nível superior conforme o edital/art. 14. <b>E)</b> o número de prepostos é fixado pelo próprio delegatário (art. 20), não pelo tribunal.<br><br><b>⚠️ Pegadinha:</b> é proibida a sucursal; o número de prepostos é definido pelo titular.<br><br><b>📌 Fundamento:</b> arts. 14, 20 e 44 da Lei 8.935/94; regime de transição (arts. 48 e segs.).<br><br><b>🔁 Revisar:</b> não há sucursal; nº de prepostos é fixado pelo titular; bacharelado não é exigência geral.<br><br><b>☑ Verificação:</b> Norma [arts. 14/20/44 Lei 8.935/94 ✔] · Tese [constitucionalidade do regime de transição — STF ✔]."},
  {id:"q3", materia:"Registral — RCPN em municípios extensos (art. 44)", banca:"Consulplan · TJ-AC · 2023", tipo:'multipla', enunciado:"O TJ/AC outorgou a Edgar uma serventia extrajudicial que acumula as atribuições de Registro Civil de Títulos e Documentos e de pessoas jurídicas, sendo a serventia a única a realizar tais funções no município, que possuía uma vasta extensão territorial. Por fim, neste município, há três distritos densamente povoados. Considerando a situação hipotética e os ditames previstos na Lei dos Cartórios, assinale a afirmativa correta.", alternativas:[{letra:"A",texto:"Nos municípios de significativa extensão territorial, a juízo do respectivo Estado, cada sede distrital disporá, no mínimo, de um registrador civil das pessoas naturais."},{letra:"B",texto:"Não há proibição acerca da instalação de sucursais em local diverso dos municípios, desde que a instalação seja excepcional e devidamente fundamentada pelo titular da serventia."},{letra:"C",texto:"Serão gratuitos os assentos do registro civil de nascimento da serventia mencionada anteriormente, bem como a primeira certidão respectiva, não se estendendo, entretanto, a gratuidade à eventual registro de óbito."},{letra:"D",texto:"Incumbe aos notários e aos oficiais de registro praticar, desde que precedido de autorização, todos os atos previstos em lei necessários à organização e execução dos serviços, podendo adotar sistemas de computação, microfilmagem, disco ótico e outros meios de reprodução."}], correta:"A", comentario:"<b>✅ Gabarito: LETRA A</b>.<br><br><b>⚖️ Por quê:</b> o art. 44, §3º, da Lei 8.935/94 determina que, nos municípios de <b>significativa extensão territorial</b>, a juízo do respectivo Estado, cada <b>sede distrital</b> disporá, no mínimo, de um <b>registrador civil das pessoas naturais</b> — a fim de garantir o acesso ao registro civil.<br><br><b>As outras:</b> <b>B)</b> a instalação de sucursais é <b>vedada</b> (art. 44, §4º). <b>C)</b> a gratuidade alcança o registro de nascimento <b>e de óbito</b> e a primeira certidão (Lei 9.534/97). <b>D)</b> os atos são praticados <b>independentemente</b> de autorização (art. 41).<br><br><b>⚠️ Pegadinha:</b> gratuidade abrange nascimento <b>e</b> óbito; atos independem de autorização.<br><br><b>📌 Fundamento:</b> art. 44, §§3º e 4º, e art. 41 da Lei 8.935/94.<br><br><b>🔁 Revisar:</b> município extenso → cada sede distrital com ao menos um RCPN (art. 44, §3º).<br><br><b>☑ Verificação:</b> Norma [art. 44 Lei 8.935/94 ✔] · Tese [N/A — letra de norma]."},
  {id:"q4", materia:"Registral — guarda dos livros (LRP art. 46)", banca:"IESES · TJ-TO · 2022", tipo:'multipla', enunciado:"Os livros, fichas, documentos, papéis, microfilmes e sistemas de computação deverão permanecer sempre sob a guarda e responsabilidade do (_____) de serviço notarial ou do registro, que zelará por sua ordem, segurança e conservação. Se houver necessidade de serem (_____), o exame deverá ocorrer (_____), em dia e hora (_____), com ciência do titular e autorização (_____). Marque a alternativa que completa correta e sequencialmente os espaços do enunciado, conforme o texto legal.", alternativas:[{letra:"A",texto:"escrevente – periciados – na sede do serviço originário – designados antecipadamente – do corregedor geral."},{letra:"B",texto:"titular – lidos – na sede do serviço – designados pelo corregedor – do juízo competente."},{letra:"C",texto:"titular – periciados – na sede do serviço – designados antecipadamente – do juízo competente."},{letra:"D",texto:"substituto – analisados – na sede da comarca – designados pelo titular – do juízo competente."}], correta:"C", comentario:"<b>✅ Gabarito: LETRA C</b>.<br><br><b>⚖️ Por quê:</b> o art. 46 da LRP impõe que livros, fichas e documentos permaneçam sob guarda do <b>titular</b> do serviço; havendo necessidade de <b>perícia</b>, o exame ocorrerá <b>na sede do serviço</b>, em dia e hora <b>designados antecipadamente</b>, com ciência do titular e autorização <b>do juízo competente</b>.<br><br><b>As outras:</b> trocam “titular” por escrevente/substituto, “periciados” por lidos/analisados, ou a autoridade autorizadora (corregedor × juízo competente).<br><br><b>⚠️ Pegadinha:</b> exame de livros = na sede, antecipadamente designado, com autorização do <b>juízo competente</b>.<br><br><b>📌 Fundamento:</b> art. 46 da Lei 6.015/73.<br><br><b>🔁 Revisar:</b> perícia dos livros ocorre na sede do serviço, autorizada pelo juízo competente.<br><br><b>☑ Verificação:</b> Norma [art. 46 LRP ✔] · Tese [N/A — letra de norma]."},
  {id:"q5", materia:"Registral — serviços e gratuidade", banca:"IESES · TJ-TO · 2022", tipo:'multipla', enunciado:"Os serviços notariais e de registro são exercidos em caráter privado, por delegação do Poder Público, regulamentados pela Lei 8.935/94, que disciplina a responsabilidade civil e criminal dos notários, dos oficiais de registro e de seus prepostos, e define a fiscalização de seus atos pelo Poder Judiciário. Sobre estes importantes serviços, assinale a alternativa INCORRETA.", alternativas:[{letra:"A",texto:"Em cada sede municipal haverá no mínimo um registrador civil das pessoas naturais."},{letra:"B",texto:"São gratuitos os assentos do registro civil de nascimento e o de óbito, bem como todas as certidões relacionadas aos referidos atos."},{letra:"C",texto:"Existe uma Lei federal que estabelece normas gerais para fixação de emolumentos relativos aos atos praticados pelos serviços notariais e de registro."},{letra:"D",texto:"O ingresso na atividade notarial e de registro depende de concurso público de provas e títulos, não se permitindo que qualquer serventia fique vaga, sem abertura de concurso de provimento ou de remoção, por mais de seis meses."}], correta:"B", comentario:"<b>✅ Gabarito: LETRA B</b> (a INCORRETA).<br><br><b>⚖️ Por quê:</b> a gratuidade (Lei 9.534/97; art. 30, VI, da Lei 8.935/94) abrange o <b>registro</b> de nascimento e óbito e a <b>primeira certidão</b> respectiva — e não “todas as certidões”. Dizer que toda e qualquer certidão é gratuita extrapola a lei, tornando a assertiva incorreta.<br><br><b>As outras:</b> <b>A)</b> art. 44 — em cada sede municipal, ao menos um RCPN. <b>C)</b> a Lei 10.169/2000 fixa normas gerais de emolumentos. <b>D)</b> art. 16 — vacância não pode ultrapassar seis meses sem abertura de concurso.<br><br><b>⚠️ Pegadinha:</b> gratuidade = registro + <b>primeira</b> certidão (não todas).<br><br><b>📌 Fundamento:</b> art. 30, VI, da Lei 8.935/94; Lei 9.534/97; Lei 10.169/2000; art. 16.<br><br><b>🔁 Revisar:</b> gratuita é a primeira certidão de nascimento/óbito, não todas.<br><br><b>☑ Verificação:</b> Norma [art. 30 Lei 8.935/94 / Lei 9.534/97 ✔] · Tese [N/A — letra de norma].<br><br><b>⚖️ Jurisprudência:</b> é constitucional a criação, por lei estadual, de fundo de apoio ao registro civil das pessoas naturais para compensar a realização dos atos gratuitos (STF)."},
  {id:"q6", materia:"Notarial — atribuições (art. 41/42)", banca:"IESES · TJ-AM · 2023", tipo:'multipla', enunciado:"A Lei 8.935/94 estabelece algumas diretrizes relacionadas à prestação de serviços notariais e de registro, os quais devem ser prestados, de modo eficiente e adequado, em dias e horários estabelecidos pelo juízo competente, atendidas as peculiaridades locais, em local de fácil acesso ao público e que ofereça segurança para o arquivamento de livros e documentos. Tendo em mente as normas estabelecidas no referido diploma legal, assinale a alternativa correta sobre a prestação dos serviços.", alternativas:[{letra:"A",texto:"É facultado ao juízo competente realizar todas as gestões e diligências necessárias ou convenientes ao preparo dos atos notariais, requerendo o que couber, devendo os requerentes arcarem como todos os ônus, inclusive os que forem provenientes de solicitação de urgência, além dos emolumentos devidos pelo ato."},{letra:"B",texto:"Incumbe aos notários e aos oficiais de registro praticar, independentemente de autorização, todos os atos previstos em lei necessários à organização e execução dos serviços, podendo, ainda, adotar sistemas de computação, microfilmagem, disco ótico e outros meios de reprodução."},{letra:"C",texto:"Verificada a absoluta impossibilidade de se prover, através de concurso público, a titularidade de serviço notarial ou de registro, por desinteresse ou inexistência de candidatos, o governado do estado poderá propor a extinção do serviço e a anexação de suas atribuições ao serviço mesmo que de natureza diversa, desde que seja o mais próximo, não sendo ser anexado ao localizado na sede do respectivo Município ou ao Município contíguo."},{letra:"D",texto:"É notória a necessidade de aplicação do Princípio da Eficiência à prestação dos serviços notariais e de registro o que fundamenta a possibilidade de uma mesma serventia prestar os serviços a ela delegados em diversas localidades, devendo o titular arcar com todas as despesas de funcionamento e dela se instalar."}], correta:"B", comentario:"<b>✅ Gabarito: LETRA B</b>.<br><br><b>⚖️ Por quê:</b> o art. 41 da Lei 8.935/94 dispõe que incumbe aos notários e oficiais praticar, <b>independentemente de autorização</b>, todos os atos previstos em lei necessários à organização e execução dos serviços, podendo adotar sistemas de computação, microfilmagem, disco ótico e outros meios de reprodução — exatamente a letra B.<br><br><b>As outras:</b> <b>A)</b> as gestões/diligências incumbem ao próprio delegatário, não ao juízo. <b>C)</b> a redação distorce a regra de anexação (art. 44). <b>D)</b> uma serventia <b>não</b> presta serviço em diversas localidades (vedada a sucursal).<br><br><b>⚠️ Pegadinha:</b> os atos são praticados <b>independentemente de autorização</b>.<br><br><b>📌 Fundamento:</b> arts. 41 e 42 da Lei 8.935/94.<br><br><b>🔁 Revisar:</b> notário/oficial atua sem necessidade de autorização para os atos do serviço (art. 41).<br><br><b>☑ Verificação:</b> Norma [art. 41 Lei 8.935/94 ✔] · Tese [N/A — letra de norma]."},
  {id:"q7", materia:"Registral — gratuidade do registro civil (Lei 9.534/97)", banca:"FGV · TJ-SC · 2021", tipo:'multipla', enunciado:"Antônio, atualmente desempregado e pessoa reconhecidamente pobre, compareceu ao cartório do Ofício de Registro Civil de Pessoas Naturais e de Interdição e de Tutelas de sua cidade e informou que perdeu a certidão de nascimento de seu filho Pedro, de 5 anos, e solicitou uma nova certidão de nascimento. Com base na Lei 8.935/94, o escrevente que o atendeu informou que:", alternativas:[{letra:"A",texto:"é gratuito o assento do registro civil de nascimento, bem como apenas a primeira certidão respectiva, razão pela qual Antônio deve arcar com o pagamento dos devidos emolumentos."},{letra:"B",texto:"não lhe serão cobrados emolumentos pela certidão de nascimento solicitada, pois se trata de pessoa reconhecidamente pobre, devendo tal condição constar em observação ao final da certidão."},{letra:"C",texto:"é gratuito o assento do registro civil de nascimento, bem como a segunda via da certidão ora solicitada, desde que Antônio apresente decisão judicial declarando sua hipossuficiência econômica."},{letra:"D",texto:"é gratuito o assento do registro civil de nascimento, bem como a segunda via da certidão ora solicitada, desde que Antônio justifique relevante motivo do requerimento do novo documento."},{letra:"E",texto:"não lhe serão cobrados emolumentos pela certidão de nascimento solicitada, pois se trata de pessoa reconhecidamente pobre e é proibida a inserção, em tal certidão, de expressões que indiquem condição de pobreza ou semelhantes."}], correta:"E", comentario:"<b>✅ Gabarito: LETRA E</b>.<br><br><b>⚖️ Por quê:</b> a Lei 9.534/97 (com a Lei 9.265/96) assegura a gratuidade do registro de nascimento/óbito e da certidão aos <b>reconhecidamente pobres</b>, sendo <b>vedado</b> inserir na certidão qualquer menção à condição de pobreza ou hipossuficiência (para evitar estigma). Logo, a certidão é gratuita e sem ressalva de pobreza.<br><br><b>As outras:</b> condicionam a gratuidade a pagamento (A), a observação de pobreza na certidão (B) ou a decisão judicial/justificativa (C e D), todos contrários à lei.<br><br><b>⚠️ Pegadinha:</b> proibido escrever na certidão que a pessoa é pobre.<br><br><b>📌 Fundamento:</b> Lei 9.534/97; art. 30 da Lei 8.935/94.<br><br><b>🔁 Revisar:</b> gratuidade ao pobre + vedação de menção à pobreza na certidão.<br><br><b>☑ Verificação:</b> Norma [Lei 9.534/97 / art. 30 Lei 8.935/94 ✔] · Tese [N/A — letra de norma].<br><br><b>⚖️ Jurisprudência:</b> é constitucional a criação, por lei estadual, de fundo de apoio ao registro civil das pessoas naturais para compensar a realização dos atos gratuitos (STF)."},
  {id:"q8", materia:"Registral — escrituração eletrônica (LRP art. 17/SERP)", banca:"Consulplan · TJ-AC · 2023", tipo:'multipla', enunciado:"A tecnologia aplicada aos serviços notariais e registrais já é parte do cotidiano dos cartórios em todo país. Sobre a escrituração prevista na LRP, assinale a afirmativa correta.", alternativas:[{letra:"A",texto:"Considerando a quantidade dos registros, o juiz poderá autorizar a diminuição do número de páginas dos livros respectivos, podendo ser os referidos livros escriturados por meio eletrônico."},{letra:"B",texto:"A escrituração será feita em livros encadernados, que obedecerão aos modelos previstos nesta normativa, podendo os referidos livros serem escriturados por meio ou eletrônico."},{letra:"C",texto:"Os registros serão escriturados, publicizados e conservados em meio eletrônico, nos termos estabelecidos pela Corregedoria Nacional de Justiça do CNJ, observadas vedações à escrituração por meio eletrônico previstas nesta normativa."},{letra:"D",texto:"Os livros de escrituração serão abertos, numerados, autenticados e encerrados pelo oficial de registro, podendo ser utilizado, para tal fim, processo mecânico de autenticação previamente aprovado pela autoridade judiciária competente, podendo ser os referidos livros escriturados por meio ou eletrônico."}], correta:"C", comentario:"<b>✅ Gabarito: LETRA C</b>.<br><br><b>⚖️ Por quê:</b> com a Lei 14.382/2022 (SERP), o art. 17, §1º, da LRP determina que os registros públicos sejam <b>escriturados, publicizados e conservados em meio eletrônico</b>, nos termos fixados pela <b>Corregedoria Nacional de Justiça do CNJ</b>, observadas as vedações legais à escrituração eletrônica.<br><br><b>As outras:</b> mantêm a lógica antiga (livros encadernados em papel) ou condicionam a escrituração eletrônica a autorização judicial — superadas pela escrituração eletrônica como regra.<br><br><b>⚠️ Pegadinha:</b> hoje a regra é meio <b>eletrônico</b>, regulado pelo CNJ.<br><br><b>📌 Fundamento:</b> art. 17, §1º, da LRP (Lei 14.382/2022).<br><br><b>🔁 Revisar:</b> registros escriturados e conservados em meio eletrônico (CNJ).<br><br><b>☑ Verificação:</b> Norma [art. 17 LRP / Lei 14.382/22 ✔] · Tese [N/A — letra de norma]."},
  {id:"q9", materia:"Registral — atos do registro (LRP art. 13)", banca:"FGV · TJ-ES · 2025", tipo:'multipla', enunciado:"À luz das disposições gerais da LRP, salvo as anotações e as averbações obrigatórias, os atos do registro serão praticados:", alternativas:[{letra:"A",texto:"por ordem judicial; a requerimento verbal ou escrito dos interessados; e a requerimento do Ministério Público ou da Defensoria Pública, quando a lei autorizar."},{letra:"B",texto:"a requerimento verbal das partes ou dos interessados; a requerimento do Ministério Público ou da Defensoria Pública, quando a lei autorizar."},{letra:"C",texto:"por ordem judicial; a requerimento verbal ou escrito dos interessados; ou a requerimento do Ministério Público, quando a lei autorizar."},{letra:"D",texto:"por ordem judicial; a requerimento escrito dos interessados; ou por meio de requisição do Ministério Público, quando a lei autorizar."},{letra:"E",texto:"a requerimento escrito dos interessados; ou por meio de requisição do Ministério Público, quando a lei autorizar."}], correta:"C", comentario:"<b>✅ Gabarito: LETRA C</b>.<br><br><b>⚖️ Por quê:</b> o art. 13 da LRP dispõe que, salvo anotações e averbações obrigatórias, os atos do registro serão praticados: <b>I)</b> por <b>ordem judicial</b>; <b>II)</b> a <b>requerimento verbal ou escrito</b> dos interessados; <b>III)</b> a requerimento do <b>Ministério Público</b>, quando a lei autorizar.<br><br><b>As outras:</b> incluem indevidamente a Defensoria Pública (A e B), restringem a “requisição” do MP (D e E) ou suprimem a ordem judicial.<br><br><b>⚠️ Pegadinha:</b> o art. 13 fala em <b>requerimento</b> do MP (não “requisição”) e não menciona a Defensoria.<br><br><b>📌 Fundamento:</b> art. 13 da Lei 6.015/73.<br><br><b>🔁 Revisar:</b> atos do registro: ordem judicial; requerimento (verbal/escrito) do interessado; requerimento do MP (art. 13).<br><br><b>☑ Verificação:</b> Norma [art. 13 LRP ✔] · Tese [N/A — letra de norma]."},
  {id:"q10", materia:"Registral — ordem do serviço (LRP arts. 8/9)", banca:"IESES · TJ-PA · 2026", tipo:'multipla', enunciado:"Sobre os serviços notariais e de registro, é INCORRETO afirmar:", alternativas:[{letra:"A",texto:"São contados em dias e horas úteis, os prazos estabelecidos para a vigência da prenotação, para os pagamentos de emolumentos e para a prática de atos pelos oficiais dos registros de imóveis, de títulos e documentos e civil de pessoas jurídicas, incluída a emissão de certidões, exceto nos casos previstos em lei e naqueles contados em meses e anos."},{letra:"B",texto:"O registro civil de pessoas naturais deve funcionar todos os dias, sem exceção."},{letra:"C",texto:"Quando o interessado no registro for o oficial encarregado de fazê-lo ou algum parente seu, em grau que determine impedimento, o ato incumbe ao substituto legal do oficial."},{letra:"D",texto:"O serviço começará e terminará às mesmas horas em todos os dias úteis."},{letra:"E",texto:"Será nulo o registro lavrado fora das horas regulamentares ou em dias em que não houver expediente, sendo civil e criminalmente responsável o oficial que der causa à nulidade, além de responder por ato de improbidade administrativa."}], correta:"E", comentario:"<b>✅ Gabarito: LETRA E</b> (a INCORRETA).<br><br><b>⚖️ Por quê:</b> os arts. 8º e 9º da LRP cuidam do horário do serviço, mas <b>não</b> cominam nulidade automática ao registro lavrado fora de hora, nem caracterizam, por si, ato de improbidade administrativa. A redação da letra E inventa sanções (nulidade + improbidade) não previstas na lei.<br><br><b>As outras:</b> reproduzem corretamente a contagem de prazos em dias/horas úteis (art. 9º-A), o funcionamento contínuo do RCPN, o impedimento do oficial parente (substituto legal) e a uniformidade do horário.<br><br><b>⚠️ Pegadinha:</b> registro fora de hora não é automaticamente nulo nem improbidade.<br><br><b>📌 Fundamento:</b> arts. 8º, 9º e 9º-A da LRP.<br><br><b>🔁 Revisar:</b> horário do serviço não gera nulidade automática nem improbidade.<br><br><b>☑ Verificação:</b> Norma [arts. 8/9/9-A LRP ✔] · Tese [N/A — letra de norma]."},
  {id:"q11", materia:"Registral — contagem de prazos (LRP art. 9º-A)", banca:"IESES · TJ-AM · 2023", tipo:'multipla', enunciado:"Acerca das atribuições, escrituração e ordem do serviço, é correto afirmar, de acordo com a LRP:", alternativas:[{letra:"A",texto:"A contagem dos prazos nos registros públicos observará os critérios estabelecidos na legislação civil."},{letra:"B",texto:"Serão contados em dias e horas úteis os prazos estabelecidos para a vigência da prenotação, para os pagamentos de emolumentos e para a prática de atos pelos oficiais dos registros de imóveis, de títulos e documentos e civil de pessoas jurídicas, incluída a emissão de certidões, exceto nos casos previstos em lei e naqueles contados em meses e anos."},{letra:"C",texto:"Os títulos e documentos, apresentados no horário regulamentar ao registro civil de pessoas naturais que não forem registrados até a hora do encerramento do serviço, aguardarão o dia seguinte, no qual serão registrados, preferencialmente, aos apresentados nesse dia."},{letra:"D",texto:"Nos casos em que da precedência decorra prioridade de direitos para o apresentante, a ausência de comprovação do recolhimento do imposto de transmissão de bem imóvel obstará a apresentação do título e o seu lançamento do Protocolo."}], correta:"B", comentario:"<b>✅ Gabarito: LETRA B</b>.<br><br><b>⚖️ Por quê:</b> o art. 9º-A da LRP (Lei 14.382/2022) prevê que se contam em <b>dias e horas úteis</b> os prazos da prenotação, do pagamento de emolumentos e da prática de atos pelos oficiais (RI, RTD e RCPJ), incluída a emissão de certidões, ressalvados os casos legais e os contados em meses e anos.<br><br><b>As outras:</b> <b>A)</b> a contagem segue a legislação <b>processual</b> civil, não “a legislação civil”. <b>C)</b> a regra do horário é dos serviços de RI/protocolo, não do RCPN (que funciona todos os dias). <b>D)</b> a falta de recolhimento do ITBI <b>não</b> obsta a apresentação/protocolo do título (art. 9º, §único).<br><br><b>⚠️ Pegadinha:</b> prazos em dias/horas <b>úteis</b> (prenotação, emolumentos, atos de RI/RTD/RCPJ).<br><br><b>📌 Fundamento:</b> art. 9º-A da LRP (Lei 14.382/2022).<br><br><b>🔁 Revisar:</b> prenotação e atos do RI/RTD/RCPJ contam-se em dias e horas úteis.<br><br><b>☑ Verificação:</b> Norma [art. 9-A LRP ✔] · Tese [N/A — letra de norma]."},
  {id:"q12", materia:"Registral — livros do RCPN (LRP art. 33)", banca:"Consulplan · TJ-AC · 2023", tipo:'multipla', enunciado:"Sobre a ordem do serviço, pode-se afirmar que o oficial deverá adotar sistema de controle, de modo a assegurar às partes a ordem de apresentação dos seus títulos, estabelecendo-se, sempre, o número de ordem geral, e zelará pela regularidade, conservação e segurança de livros, fichas e documentos. No que diz respeito à escrituração e à ordem de serviço, assinale a afirmativa correta.", alternativas:[{letra:"A",texto:"Haverá, em cada cartório, os livros: “A” – de registro de nascimento; “B” – de registro de casamento; “B Auxiliar” – de registro de casamento Religioso para Efeitos Civis; “C” – de registro de óbitos; “C Auxiliar” – de registro de natimortos; “D” – de registro de proclamas."},{letra:"B",texto:"Haverá, em cada cartório, os livros: “A” – de registro de nascimento; “B” – de registro de casamento; “B Auxiliar” – de registro de casamento religioso para efeitos civis; “C” – de registro de óbitos; “C Auxiliar” – de registro de natimortos; “D” – de registro de proclamas; “E” – de registro mercantil."},{letra:"C",texto:"Haverá, em cada cartório, os livros: “A” – de registro de nascimento; “B” – de registro de casamento; “B Auxiliar” – de registro de casamento religioso para efeitos civis; “C” – de registro de óbitos; “C Auxiliar” – de registro de natimortos; “D” – de registro de proclamas; “E” – de registro de inadimplentes."},{letra:"D",texto:"Haverá, em cada cartório, os livros: “A” – de registro de nascimento; “B” – de registro de casamento; “B Auxiliar” – de registro de casamento religioso para efeitos civis; “C” – de registro de óbitos; “C Auxiliar” – de registro de natimortos; “D” – de registro de proclamas; “E” – de registro de certidões de dívida ativa da União, dos Estados, do Distrito Federal, dos Municípios e das respectivas autarquias e fundações públicas."}], correta:"A", comentario:"<b>✅ Gabarito: LETRA A</b>.<br><br><b>⚖️ Por quê:</b> o art. 33 da LRP fixa os livros do RCPN: <b>A</b> (nascimento), <b>B</b> (casamento), <b>B Auxiliar</b> (casamento religioso para efeitos civis), <b>C</b> (óbitos), <b>C Auxiliar</b> (natimortos) e <b>D</b> (proclamas). Não há livro “E”.<br><br><b>As outras:</b> acrescentam um inexistente livro “E” (mercantil, de inadimplentes ou de dívida ativa).<br><br><b>⚠️ Pegadinha:</b> os livros vão de A a D (com B e C auxiliares) — não existe livro “E”.<br><br><b>📌 Fundamento:</b> art. 33 da Lei 6.015/73.<br><br><b>🔁 Revisar:</b> livros do RCPN: A, B, B Aux, C, C Aux, D (art. 33).<br><br><b>☑ Verificação:</b> Norma [art. 33 LRP ✔] · Tese [N/A — letra de norma]."},
  {id:"q13", materia:"Registral — contagem de prazos (LRP art. 9º)", banca:"IESES · TJ-TO · 2022", tipo:'multipla', enunciado:"A contagem dos prazos nos registros públicos observará:", alternativas:[{letra:"A",texto:"os critérios estabelecidos na legislação estadual da territorialidade da serventia."},{letra:"B",texto:"os dias corridos, sem interrupção de feriados nacionais."},{letra:"C",texto:"os critérios estabelecidos na legislação processual civil."},{letra:"D",texto:"as normativas próprias de cada serventia."}], correta:"C", comentario:"<b>✅ Gabarito: LETRA C</b>.<br><br><b>⚖️ Por quê:</b> a LRP determina que a contagem dos prazos nos registros públicos observe os critérios da <b>legislação processual civil</b> (CPC) — daí a contagem em dias úteis para os prazos do serviço registral (art. 9º/9º-A).<br><br><b>As outras:</b> remetem a critérios estaduais (A), dias corridos (B) ou normas internas de cada serventia (D), todos incorretos.<br><br><b>⚠️ Pegadinha:</b> a referência é a lei <b>processual</b> civil, não a legislação estadual nem dias corridos.<br><br><b>📌 Fundamento:</b> arts. 9º e 9º-A da LRP; CPC.<br><br><b>🔁 Revisar:</b> prazos dos registros públicos seguem a legislação processual civil.<br><br><b>☑ Verificação:</b> Norma [arts. 9/9-A LRP ✔] · Tese [N/A — letra de norma]."},
  {id:"q14", materia:"Registral — atos sem adiamento (LRP art. 12)", banca:"IESES · TJ-TO · 2022", tipo:'multipla', enunciado:"Conforme dispõe a LRP, todos os títulos, apresentados no horário regulamentar e que não forem registrados até a hora do encerramento do serviço, aguardarão o dia seguinte, no qual serão registrados, preferencialmente, aos apresentados nesse dia. Qual dos registros descritos abaixo não poderá, entretanto, ser adiado:", alternativas:[{letra:"A",texto:"o registro de emancipação."},{letra:"B",texto:"o registro civil de pessoas naturais."},{letra:"C",texto:"o registro de protesto."},{letra:"D",texto:"o registro dos contratos sociais, atos constitutivos e estatutos."}], correta:"B", comentario:"<b>✅ Gabarito: LETRA B</b>.<br><br><b>⚖️ Por quê:</b> o art. 12, parágrafo único, da LRP ressalva que <b>não pode ser adiado</b> o registro civil de pessoas naturais (nascimento e óbito que devam ser feitos de imediato), em razão da urgência e da finalidade do ato.<br><br><b>As outras:</b> emancipação, protesto e atos de RCPJ podem aguardar o dia seguinte, na ordem de apresentação.<br><br><b>⚠️ Pegadinha:</b> o que <b>não</b> espera é o RCPN (nascimento/óbito).<br><br><b>📌 Fundamento:</b> art. 12, §único, da Lei 6.015/73.<br><br><b>🔁 Revisar:</b> registro civil de pessoas naturais não é adiável (art. 12).<br><br><b>☑ Verificação:</b> Norma [art. 12 LRP ✔] · Tese [N/A — letra de norma]."},
  {id:"q15", materia:"Registral — certidões e atos do RCPN", banca:"IESES · TJ-TO · 2022", tipo:'multipla', enunciado:"Tendo em mente as atribuições legais e a escrituração no Registro Civil das Pessoas Naturais, escolha o item que qualifica corretamente cada uma das sentenças como falsa ou verdadeira.<br>I. Todos os títulos, apresentados no horário regulamentar e que não forem registrados até a hora do encerramento do serviço, aguardarão o dia seguinte, no qual serão registrados, preferencialmente, aos apresentados nesse dia. O registro civil de pessoas naturais poderá, entretanto, ser adiado quando o nascimento ou o óbito ocorrer em feriados nacionais.<br>II. Os atos do registro civil somente serão praticados por ordem judicial, a requerimento do Ministério Público.<br>III. Quando o interessado no registro for o oficial encarregado de fazê-lo ou algum parente seu, em grau que determine impedimento, o ato deverá ser feito na comarca mais próxima ao domicílio de quem sofreu o impedimento legal.<br>IV. A certidão será lavrada em inteiro teor, em resumo, ou em relatório, conforme quesitos, e devidamente autenticada pelo oficial ou seus substitutos legais, não podendo ser retardada por mais de 15 dias.", alternativas:[{letra:"A",texto:"F, F, F, V."},{letra:"B",texto:"V, V, V, F."},{letra:"C",texto:"F, F, F, F."},{letra:"D",texto:"F, F, F, V."}], correta:"C", comentario:"<b>✅ Gabarito: LETRA C</b> (todas falsas).<br><br><b>⚖️ Por quê:</b> <b>I)</b> falsa — o RCPN (nascimento/óbito) <b>não</b> pode ser adiado, nem mesmo em feriados (art. 12, §único). <b>II)</b> falsa — os atos do registro também se fazem a <b>requerimento dos interessados</b>, não só por ordem judicial/MP (art. 13). <b>III)</b> falsa — havendo impedimento do oficial, o ato é feito pelo <b>substituto legal</b>, e não “na comarca mais próxima”. <b>IV)</b> falsa — a certidão não pode ser retardada por mais de <b>5 dias</b> (art. 19), e não 15.<br><br><b>⚠️ Pegadinha:</b> prazo da certidão é <b>5 dias</b>; RCPN não se adia; impedimento → substituto legal.<br><br><b>📌 Fundamento:</b> arts. 12, 13 e 19 da Lei 6.015/73.<br><br><b>🔁 Revisar:</b> certidão em até 5 dias; RCPN não adia; impedimento resolve-se pelo substituto.<br><br><b>☑ Verificação:</b> Norma [arts. 12/13/19 LRP ✔] · Tese [N/A — letra de norma]."}

function defaultState(){return{respostas:{},revisao:{},caderno:{},revisarDepois:{},posicao:0,modo:'todas',materiaFiltro:'',notas:{}};}
let state=defaultState(),lista=[],paused=false,qSecs=0,sSecs=0,timerInterval=null,commentOpen={};
function saveState(){try{localStorage.setItem(STORE_KEY,JSON.stringify(state));}catch(e){}}
function loadState(){try{var raw=localStorage.getItem(STORE_KEY);if(raw){state=Object.assign(defaultState(),JSON.parse(raw));}}catch(e){state=defaultState();}}
function today(){return new Date().toISOString().split('T')[0];}
function addDays(d,n){var dt=new Date(d+'T12:00:00');dt.setDate(dt.getDate()+n);return dt.toISOString().split('T')[0];}
function fmtDate(iso){if(!iso)return'';var p=iso.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function shuffle(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function buildLista(){var t=today(),ids;if(state.modo==='todas'){ids=QUESTOES.map(function(q){return q.id;});}else if(state.modo==='hoje'){ids=QUESTOES.filter(function(q){var r=state.revisao[q.id];return r&&r.nextDate&&r.nextDate<=t;}).map(function(q){return q.id;});}else if(state.modo==='caderno'){ids=QUESTOES.filter(function(q){return state.caderno[q.id]||state.revisarDepois[q.id];}).map(function(q){return q.id;});}else if(state.modo==='materia'){var m=state.materiaFiltro;ids=QUESTOES.filter(function(q){return !m||q.materia===m;}).map(function(q){return q.id;});}else if(state.modo==='aleatorio'){ids=shuffle(QUESTOES.map(function(q){return q.id;}));}else{ids=QUESTOES.map(function(q){return q.id;});}return ids;}
function computeStats(){var total=QUESTOES.length,acertos=0,erros=0,t=today(),revisadasHoje=0;QUESTOES.forEach(function(q){var r=state.respostas[q.id];if(r){if(r===q.correta)acertos++;else erros++;}var rev=state.revisao[q.id];if(rev&&rev.lastAnswered===t)revisadasHoje++;});var respondidas=acertos+erros,pendentes=total-respondidas,pct=total>0?Math.round(respondidas/total*100):0;return{total:total,acertos:acertos,erros:erros,pendentes:pendentes,revisadasHoje:revisadasHoje,respondidas:respondidas,pct:pct};}
function renderStats(){var s=computeStats();document.getElementById('statsBar').innerHTML='<div class="stat-chip"><span class="sv green">'+s.acertos+'</span><span class="sl">Acertos</span></div><div class="stat-chip"><span class="sv red">'+s.erros+'</span><span class="sl">Erros</span></div><div class="stat-chip"><span class="sv amber">'+s.pendentes+'</span><span class="sl">Pendentes</span></div><div class="stat-chip"><span class="sv cyan">'+s.revisadasHoje+'</span><span class="sl">Revisadas hoje</span></div>';var fill=document.getElementById('progressFill'),lbl=document.getElementById('progressLabel');if(fill)fill.style.width=s.pct+'%';if(lbl)lbl.textContent=s.respondidas+'/'+s.total+' respondidas ('+s.pct+'%)';}
function fmtTime(secs){return String(Math.floor(secs/60)).padStart(2,'0')+':'+String(secs%60).padStart(2,'0');}
function startTimers(){if(timerInterval)clearInterval(timerInterval);timerInterval=setInterval(function(){if(!paused){qSecs++;sSecs++;}var q=document.getElementById('timerQ'),s=document.getElementById('timerS');if(q)q.textContent=fmtTime(qSecs);if(s)s.textContent=fmtTime(sSecs);},1000);}
function resetQTimer(){qSecs=0;var q=document.getElementById('timerQ');if(q)q.textContent='00:00';}
function togglePause(){paused=!paused;var b=document.getElementById('btnPause');if(b)b.textContent=paused?'Retomar':'Pausar';}
function scheduleNext(id,acertou){var t=today(),rv=state.revisao[id]||{nextDate:null,interval:1,acertos:0,lastAnswered:null};rv.lastAnswered=t;if(acertou){rv.acertos=(rv.acertos||0)+1;rv.interval=rv.acertos===1?1:rv.acertos===2?7:30;}else{rv.acertos=0;rv.interval=1;}rv.nextDate=addDays(t,rv.interval);state.revisao[id]=rv;}
function scheduleManual(id,days){var t=today(),rv=state.revisao[id]||{nextDate:null,interval:days,acertos:0,lastAnswered:t};rv.nextDate=days===0?null:addDays(t,days);rv.interval=days;state.revisao[id]=rv;saveState();renderCard();}
function reviewBadgeHTML(id){var rv=state.revisao[id];if(!rv||!rv.nextDate)return'';if(rv.nextDate<=today())return'<span class="review-badge review-today">revisar hoje ⏰</span>';return'<span class="review-badge review-future">📅 '+fmtDate(rv.nextDate)+'</span>';}
function schedRowHTML(id){return'<div class="sched-row"><span class="sched-label">Agendar:</span><button class="sched-btn" onclick="scheduleManual(\''+id+'\',1)">1 dia</button><button class="sched-btn" onclick="scheduleManual(\''+id+'\',7)">7 dias</button><button class="sched-btn" onclick="scheduleManual(\''+id+'\',30)">30 dias</button><button class="sched-btn remove" onclick="scheduleManual(\''+id+'\',0)">remover</button></div>';}
function starBtnHTML(id){var active=state.revisarDepois[id]?' active':'',label=state.revisarDepois[id]?'⭐ No caderno':'☆ Revisar depois';return'<button class="star-btn'+active+'" onclick="toggleStar(\''+id+'\')">'+label+'</button>';}
function toggleStar(id){if(state.revisarDepois[id])delete state.revisarDepois[id];else state.revisarDepois[id]=true;saveState();renderCard();renderStats();}
function selecionarAlternativa(id,letra){if(state.respostas[id])return;document.querySelectorAll('.alt-btn[data-id="'+id+'"]').forEach(function(b){b.classList.remove('selected');});var btn=document.querySelector('.alt-btn[data-id="'+id+'"][data-letra="'+letra+'"]');if(btn)btn.classList.add('selected');var c=document.getElementById('confirm-'+id);if(c)c.disabled=false;}
function syncResultado(){try{var total=QUESTOES.length,acertos=0,erradas=[];QUESTOES.forEach(function(q){var r=state.respostas[q.id];if(r){if(r===q.correta){acertos++;}else{erradas.push({id:q.id,enunciado:q.enunciado,gabarito:q.correta,resposta:r,alternativas:q.alternativas,comentario:q.comentario});}}});var m=(SLUG.match(/meta(\d+)/)||[])[1];fetch('https://danielbesis-site.vercel.app/api/resultado',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:(function(){try{var u=new URLSearchParams(location.search).get("uid");if(u){localStorage.setItem("db_uid",u);return u;}return localStorage.getItem("db_uid")||null;}catch(e){return null;}})(),slug:SLUG,metaNumero:m?parseInt(m,10):null,respostas:state.respostas,total:total,acertos:acertos,erradas:erradas})}).catch(function(){});}catch(e){}}
function confirmar(id){var q=QUESTOES.find(function(x){return x.id===id;});if(!q)return;var sel=document.querySelector('.alt-btn[data-id="'+id+'"].selected');if(!sel)return;var letra=sel.dataset.letra;state.respostas[id]=letra;var acertou=letra===q.correta;scheduleNext(id,acertou);if(!acertou)state.caderno[id]=true;saveState();syncResultado();renderCard();renderStats();}
function toggleComment(id){commentOpen[id]=!commentOpen[id];var body=document.getElementById('comment-body-'+id),tog=document.getElementById('comment-toggle-'+id);if(body)body.classList.toggle('open',!!commentOpen[id]);if(tog)tog.textContent=commentOpen[id]?'▲ Ocultar comentário':'▼ Ver comentário / gabarito (ICOL)';}
function salvarNota(id,txt){if(!state.notas)state.notas={};state.notas[id]=txt;saveState();}
function renderCard(){var cont=document.getElementById('mainContent');if(!lista.length){cont.innerHTML='<div class="empty-state"><div class="icon">📭</div><div>Nenhuma questão neste filtro.</div></div>';return;}var pos=Math.min(Math.max(state.posicao,0),lista.length-1);state.posicao=pos;var id=lista[pos],q=QUESTOES.find(function(x){return x.id===id;});if(!q){cont.innerHTML='';return;}var resposta=state.respostas[id],respondida=!!resposta,acertou=respondida&&resposta===q.correta;var resultHTML='';if(respondida){resultHTML=acertou?'<div class="result-banner correct">✅ Correto! Resposta: '+resposta+'</div>':'<div class="result-banner wrong">❌ Incorreto. Sua resposta: '+resposta+' | Gabarito: '+q.correta+'</div>';}var altsHTML='<div class="alts">';q.alternativas.forEach(function(alt){var btnCls='alt-btn',letraCls='alt-letra',disabled=respondida?'disabled':'';if(respondida){if(alt.letra===q.correta&&alt.letra===resposta){btnCls='alt-btn correct';letraCls='alt-letra correct';}else if(alt.letra===q.correta){btnCls='alt-btn reveal-correct';letraCls='alt-letra reveal-correct';}else if(alt.letra===resposta){btnCls='alt-btn wrong';letraCls='alt-letra wrong';}}altsHTML+='<button class="'+btnCls+'" data-id="'+id+'" data-letra="'+alt.letra+'" '+disabled+' onclick="selecionarAlternativa(\''+id+'\',\''+alt.letra+'\')"><span class="'+letraCls+'">'+alt.letra+'</span><span>'+alt.texto+'</span></button>';});altsHTML+='</div>';var confirmHTML=respondida?'':'<button class="btn-confirm" id="confirm-'+id+'" onclick="confirmar(\''+id+'\')" disabled>Confirmar</button>';var cOpen=commentOpen[id]?' open':'',cLabel=commentOpen[id]?'▲ Ocultar comentário':'▼ Ver comentário / gabarito (ICOL)';var commentHTML=respondida?'<div class="comment-wrap"><button class="comment-toggle" id="comment-toggle-'+id+'" onclick="toggleComment(\''+id+'\')">'+cLabel+'</button><div class="comment-body'+cOpen+'" id="comment-body-'+id+'">'+q.comentario+'</div></div>':'';var schedHTML=respondida?schedRowHTML(id):'';var notaVal=(state.notas&&state.notas[id])?state.notas[id]:'';var notasHTML='<div class="notas-wrap"><div class="notas-label">📝 Minhas anotações</div><textarea class="notas-area" placeholder="Escreva aqui suas anotações sobre esta questão…" oninput="salvarNota(\''+id+'\', this.value)">'+notaVal.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</textarea></div>';cont.innerHTML='<div class="nav-counter">Questão '+(pos+1)+' de '+lista.length+'</div><div class="card"><div class="card-meta"><span class="badge badge-banca">'+q.banca+'</span><span class="badge badge-materia">'+q.materia+'</span>'+reviewBadgeHTML(id)+starBtnHTML(id)+claudeBtnHTML(id)+'</div><div class="enunciado">'+q.enunciado+'</div>'+altsHTML+confirmHTML+resultHTML+commentHTML+schedHTML+notasHTML+'</div><div class="nav-row"><button class="nav-btn" onclick="navPrev()" '+(pos===0?'disabled':'')+'>← Anterior</button><button class="nav-btn" onclick="navNext()" '+(pos>=lista.length-1?'disabled':'')+'>Próxima →</button></div>';}
function navPrev(){if(state.posicao>0){state.posicao--;saveState();resetQTimer();renderCard();}}
function navNext(){if(state.posicao<lista.length-1){state.posicao++;saveState();resetQTimer();renderCard();}}
function setModo(modo){state.modo=modo;state.posicao=0;var sel=document.getElementById('materiaSelect');if(sel)sel.style.display=modo==='materia'?'':'none';document.querySelectorAll('.mode-btn').forEach(function(b){b.classList.toggle('active',b.dataset.modo===modo);});lista=buildLista();saveState();resetQTimer();renderCard();renderStats();}
function setMateriaFiltro(val){state.materiaFiltro=val;state.posicao=0;lista=buildLista();saveState();resetQTimer();renderCard();}
function populateMateriaSelect(){var materias=[];QUESTOES.forEach(function(q){if(materias.indexOf(q.materia)===-1)materias.push(q.materia);});materias.sort();var sel=document.getElementById('materiaSelect');if(!sel)return;sel.innerHTML='<option value="">— Escolha —</option>';materias.forEach(function(m){var o=document.createElement('option');o.value=m;o.textContent=m;if(m===state.materiaFiltro)o.selected=true;sel.appendChild(o);});}
function recomecar(){if(confirm('Tem certeza? Todo o progresso será apagado permanentemente.')){localStorage.removeItem(STORE_KEY);location.reload();}}
function exportarProgresso(){var blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='progresso_'+SLUG+'_'+today()+'.json';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);}
function exportarNotas(){var txt='ANOTAÇÕES — '+document.title+'\n'+today()+'\n\n',n=0;QUESTOES.forEach(function(q){var nota=state.notas&&state.notas[q.id];if(nota&&nota.trim()){n++;txt+='【'+q.banca+' · '+q.materia+'】\n'+nota.trim()+'\n\n';}});if(!n){alert('Você ainda não tem anotações registradas.');return;}var blob=new Blob([txt],{type:'text/plain;charset=utf-8'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='anotacoes_'+SLUG+'_'+today()+'.txt';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);}
function importarProgresso(evt){var file=evt.target.files[0];if(!file)return;var reader=new FileReader();reader.onload=function(e){try{state=Object.assign(defaultState(),JSON.parse(e.target.result));saveState();lista=buildLista();populateMateriaSelect();document.querySelectorAll('.mode-btn').forEach(function(b){b.classList.toggle('active',b.dataset.modo===state.modo);});var sel=document.getElementById('materiaSelect');if(sel)sel.style.display=state.modo==='materia'?'':'none';renderStats();renderCard();alert('Progresso importado com sucesso!');}catch(err){alert('Arquivo inválido ou corrompido.');}};reader.readAsText(file);evt.target.value='';}
function dismissIframeBanner(){var b=document.getElementById('bannerIframe');if(b)b.style.display='none';try{sessionStorage.setItem('iframe_banner_dismissed','1');}catch(e){}}
function checkIframeBanner(){try{if(sessionStorage.getItem('iframe_banner_dismissed')==='1'){var b=document.getElementById('bannerIframe');if(b)b.style.display='none';}}catch(e){}}
function init(){loadState();checkIframeBanner();populateMateriaSelect();document.querySelectorAll('.mode-btn').forEach(function(b){b.classList.toggle('active',b.dataset.modo===state.modo);});var sel=document.getElementById('materiaSelect');if(sel&&state.modo==='materia')sel.style.display='';lista=buildLista();renderStats();renderCard();startTimers();}
function claudeBtnHTML(id){return '<button class="claude-qbtn" onclick="askClaude(\''+id+'\')">🤖</button>';}
function askClaude(id){var q=QUESTOES.find(function(x){return x.id===id;});if(!q)return;var ctx=document.title+' · Questão '+id+'\nTema: '+q.materia+'\nBanca: '+(q.banca||'')+'\nConcurso: Cartório TJMT\n\nEnunciado:\n'+q.enunciado.replace(/<[^>]+>/g,'')+'\n\nTenho uma dúvida sobre esta questão:\n';navigator.clipboard.writeText(ctx).catch(function(){});window.open('https://claude.ai','_blank');}
init();

window.addEventListener("load",function(){try{syncResultado();}catch(e){}});/*sync-on-load*/
</script>
</body>
</html>
