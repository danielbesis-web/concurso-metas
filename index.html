const app = document.getElementById('app');
const esc = s => s;

function render(){
  app.innerHTML = QS.map(q=>{
    const items = q.items && q.items.length
      ? `<div class="items">${q.items.map(it=>`<div class="item">${it}</div>`).join('')}</div>` : '';
    const prompt = q.prompt ? `<div class="prompt">${q.prompt}</div>` : '';
    const opts = q.opts.map(([L,txt])=>`
      <button class="opt" data-q="${q.n}" data-l="${L}">
        <span class="badge">${L}</span><span class="txt">${txt}</span>
      </button>`).join('');
    const secs = q.secs.map(s=>`
      <div class="sec ${s.c}">
        <div class="tile">${s.i}</div>
        <div class="sbody">
          <div class="sttl">${s.t}</div>
          <ul class="slist">${s.li.map(x=>`<li>${x}</li>`).join('')}</ul>
        </div>
      </div>`).join('');
    const verif = `
      <div class="sec cyan">
        <div class="tile">🔍</div>
        <div class="sbody">
          <div class="sttl">VERIFICAÇÃO</div>
          <div class="verif">
            <div class="vrow"><span class="vk">QConcursos</span><span class="vlead"></span><span class="vv ok">${q.verif.qc}<span class="vbox">✓</span></span></div>
            <div class="vrow"><span class="vk">Dizer o Direito</span><span class="vlead"></span><span class="vv">${q.verif.dd}</span></div>
            <div class="vrow"><span class="vk">Norma</span><span class="vlead"></span><span class="vv ok">${q.verif.norma}${q.verif.norma!=='—'?'<span class="vbox">✓</span>':''}</span></div>
          </div>
        </div>
      </div>`;
    return `
    <div class="q" id="q${q.n}">
      <div class="meta">Q${q.n} · <b>${q.meta}</b> — ${q.tema}</div>
      <div class="card">
        <div class="label">QUESTÃO</div>
        <div class="enun">${q.enun}</div>
        ${items}${prompt}
        <div class="opts" id="opts${q.n}">${opts}</div>
        <div class="verdict" id="vd${q.n}"></div>
        <button class="togg" data-tg="${q.n}">
          <span>📋 Gabarito comentado</span><span class="ar">▾</span>
        </button>
        <div class="com" id="com${q.n}">
          <div class="gcard">
            <div class="ghead">
              <div class="gcheck">✓</div>
              <div>
                <div class="gtitle">GABARITO: <span class="ans">${q.answer}</span> &nbsp;<span class="gpill">✓ oficial confirmado</span></div>
              </div>
            </div>
            <div class="gsrc">QConcursos <b>${q.id}</b></div>
            <div class="gcmd">(comando: ${q.comando})</div>
            <div style="margin-top:8px">${secs}${verif}</div>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  document.querySelectorAll('.opt').forEach(b=>b.addEventListener('click',onAnswer));
  document.querySelectorAll('.togg').forEach(b=>b.addEventListener('click',onToggle));
}

const state = {};
function onAnswer(e){
  const b = e.currentTarget;
  const n = b.dataset.q, L = b.dataset.l;
  if(state[n]) return;
  const q = QS.find(x=>x.n==n);
  state[n] = L;
  const box = document.getElementById('opts'+n);
  box.classList.add('answered');
  box.querySelectorAll('.opt').forEach(o=>{
    if(o.dataset.l===q.answer) o.classList.add('correct');
    if(o.dataset.l===L && L!==q.answer) o.classList.add('wrong');
  });
  const vd = document.getElementById('vd'+n);
  if(L===q.answer){ vd.className='verdict ok show'; vd.textContent='✓ Você acertou!'; }
  else { vd.className='verdict no show'; vd.innerHTML='✗ Você errou — gabarito oficial: <b>'+q.answer+'</b>'; }
  updatePlacar();
}
function onToggle(e){
  const n = e.currentTarget.dataset.tg;
  document.getElementById('com'+n).classList.toggle('open');
  e.currentTarget.classList.toggle('open');
}
function updatePlacar(){
  let ac=0,er=0;
  QS.forEach(q=>{ if(state[q.n]){ state[q.n]===q.answer?ac++:er++; }});
  document.getElementById('pAc').textContent=ac;
  document.getElementById('pEr').textContent=er;
  document.getElementById('pPe').textContent=QS.length-ac-er;
}
function resetAll(){
  for(const k in state) delete state[k];
  render(); updatePlacar();
  window.scrollTo({top:0,behavior:'smooth'});
}
render();
</script>
