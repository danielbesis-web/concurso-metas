<script>
const STORE_KEY = 'concurso_meta21_notarial_parte3_v1';   // chave do localStorage deste simulado
const SLUG = STORE_KEY.replace(/^concurso_/,'');   // usado nos nomes dos arquivos de exportação
const QUESTOES = [
  {id:"q1", materia:"Registral — publicidade/certidão de situação jurídica (LRP art. 19)", banca:"IESES · TJ-PA · 2026", tipo:'multipla', enunciado:"Acerca da publicidade no registro imobiliário, é correto afirmar:", alternativas:[{letra:"A",texto:"O prazo máximo para emissão da certidão da situação jurídica do imóvel é de 5 dias, contados a partir do pagamento dos emolumentos."},{letra:"B",texto:"As certidões em meio físico, materializadas em papel de segurança, não são obrigatórias."},{letra:"C",texto:"A certidão da situação jurídica atualizada do imóvel inclui informações vigentes sobre a descrição, proprietário, direitos, ônus e restrições, sejam judiciais ou administrativas, incidentes sobre o imóvel e o respectivo titular."},{letra:"D",texto:"Vigora o sistema de publicidade indireta porque, se o registrador vislumbrar intenções contrárias à LGPD, pode exigir identificação do interessado ou mesmo negar a emissão, restringindo a publicidade direta, sem esses empecilhos."},{letra:"E",texto:"O prazo máximo para emissão de certidão de inteiro teor da matrícula ou do livro auxiliar, em meio eletrônico, requerida no horário de expediente, desde que tenha sido informado o número pelo requerente é de 6 horas, contadas a partir do pagamento dos emolumentos."}], correta:"C", comentario:"<b>✅ Gabarito: LETRA C</b>.<br><br><b>⚖️ Por quê:</b> a certidão de <b>situação jurídica atualizada</b> do imóvel (art. 19, §1º, da LRP, com a Lei 14.382/2022) reúne as informações <b>vigentes</b> sobre descrição, titularidade, direitos, ônus e restrições — judiciais ou administrativas — incidentes sobre o imóvel e seu titular.<br><br><b>As outras:</b> erram o prazo (A), negam a obrigatoriedade da certidão física quando solicitada (B), distorcem o regime de publicidade alegando “publicidade indireta” por LGPD (D) ou inventam prazo de “6 horas” (E).<br><br><b>⚠️ Pegadinha:</b> certidão de situação jurídica reúne tudo o que está <b>vigente</b> (ônus/restrições incluídos).<br><br><b>📌 Fundamento:</b> art. 19, §1º, da LRP (Lei 14.382/2022).<br><br><b>🔁 Revisar:</b> certidão de situação jurídica = panorama vigente do imóvel e do titular.<br><br><b>☑ Verificação:</b> Norma [art. 19 LRP ✔] · Tese [N/A — letra de norma]."},
  {id:"q2", materia:"Registral — prazo da certidão (LRP art. 19)", banca:"IESES · TJ-PA · 2026", tipo:'multipla', enunciado:"Nos termos expressos da LRP, as certidões expedidas pelo Registro Civil das Pessoas Naturais não poderão ser retardadas por mais de:", alternativas:[{letra:"A",texto:"5 dias."},{letra:"B",texto:"30 dias."},{letra:"C",texto:"10 dias."},{letra:"D",texto:"15 dias."},{letra:"E",texto:"24 horas."}], correta:"A", comentario:"<b>✅ Gabarito: LETRA A</b>.<br><br><b>⚖️ Por quê:</b> o art. 19 da LRP estabelece que a certidão será lavrada em inteiro teor, resumo ou relatório, conforme os quesitos, e <b>não poderá ser retardada por mais de 5 dias</b>.<br><br><b>As outras:</b> 10, 15, 30 dias ou 24 horas não correspondem ao prazo legal.<br><br><b>⚠️ Pegadinha:</b> prazo da certidão = <b>5 dias</b>.<br><br><b>📌 Fundamento:</b> art. 19 da Lei 6.015/73.<br><br><b>🔁 Revisar:</b> certidão não retardada por mais de 5 dias.<br><br><b>☑ Verificação:</b> Norma [art. 19 LRP ✔] · Tese [N/A — letra de norma]."},
  {id:"q3", materia:"Registral — certidões do RCPN (LRP arts. 19/20/45)", banca:"IESES · TJ-PA · 2026", tipo:'multipla', enunciado:"A LRP disciplina a forma, o conteúdo e o prazo para expedição das certidões do Registro Civil das Pessoas Naturais. Analise os itens, atribuindo-lhes verdadeiro ou falso, e escolha a alternativa que indica a sequência correta, conforme a legislação pátria:<br>I. As certidões do registro civil poderão ser lavradas em inteiro teor, em resumo ou em relatório, conforme quesitos.<br>II. As certidões do registro civil deverão mencionar expressamente a circunstância de ser legítima, ou não, a filiação.<br>III. A certidão de inteiro teor poderá ser extraída por meio reprográfico ou eletrônico.<br>IV. As certidões de nascimento mencionarão a data do registro, a data, por extenso, do nascimento e a naturalidade.", alternativas:[{letra:"A",texto:"V, V, V, V."},{letra:"B",texto:"F, F, F, F."},{letra:"C",texto:"V, F, V, V."},{letra:"D",texto:"F, F, V, V."},{letra:"E",texto:"V, F, F, V."}], correta:"C", comentario:"<b>✅ Gabarito: LETRA C</b> (V, F, V, V).<br><br><b>⚖️ Por quê:</b> <b>I)</b> verdadeira — a certidão pode ser em inteiro teor, resumo ou relatório, conforme quesitos (art. 19). <b>II)</b> falsa — é <b>vedado</b> mencionar na certidão a circunstância de ser legítima ou não a filiação (proteção contra discriminação; art. 45). <b>III)</b> verdadeira — a certidão de inteiro teor é extraída por meio reprográfico ou eletrônico (art. 19, §1º). <b>IV)</b> verdadeira — a certidão de nascimento traz data do registro, data por extenso do nascimento e a naturalidade (art. 20, §único).<br><br><b>⚠️ Pegadinha:</b> proibido mencionar legitimidade/ilegitimidade da filiação.<br><br><b>📌 Fundamento:</b> arts. 19, 20 e 45 da Lei 6.015/73.<br><br><b>🔁 Revisar:</b> certidão não menciona se a filiação é “legítima” ou não.<br><br><b>☑ Verificação:</b> Norma [arts. 19/20/45 LRP ✔] · Tese [N/A — letra de norma]."},
  {id:"q4", materia:"Registral — certidão de inteiro teor e ônus", banca:"CEBRASPE · TJ-RR · 2025", tipo:'multipla', enunciado:"Acerca da publicidade da situação jurídica de bens, restrições e limitações de direitos no registro de imóveis, assinale a opção correta.", alternativas:[{letra:"A",texto:"Toda certidão deve ser emitida pelo registro imobiliário no prazo máximo de cinco dias, contados do pagamento dos emolumentos correspondentes."},{letra:"B",texto:"No caso de certidão de inteiro teor acerca de imóvel, tecnicamente não há necessidade de a serventia registral indicar adicionalmente, de forma expressa, a inexistência de ônus incidente sobre ele."},{letra:"C",texto:"Cada serventia registral está autorizada a receber apenas pedidos de certidão dos atos nela registrados."},{letra:"D",texto:"A publicidade das informações existentes no registro de imóveis deve dar-se de forma invariavelmente indireta, mediante expedição de certidões e informações, para a devida segurança dos dados."},{letra:"E",texto:"Informações consistem na comunicação de elementos do registro imobiliário, sendo realizadas geralmente de forma verbal, destinadas a qualquer pessoa e caracterizadas como menos amplas que as certidões."}], correta:"B", comentario:"<b>✅ Gabarito: LETRA B</b>.<br><br><b>⚖️ Por quê:</b> a certidão de <b>inteiro teor</b> reproduz integralmente a matrícula e seus registros e averbações; assim, ela já evidencia a existência (ou não) de ônus, sendo tecnicamente <b>desnecessário</b> consignar à parte e expressamente a “inexistência de ônus”.<br><br><b>As outras:</b> <b>A)</b> nem toda certidão tem prazo de 5 dias (há prazos diferenciados, inclusive eletrônicos). <b>C)</b> com a interconexão registral, é possível obter certidões de atos de outras serventias. <b>D)</b> a publicidade também se dá de forma direta (informações). <b>E)</b> as informações não são “geralmente verbais”; observam forma própria.<br><br><b>⚠️ Pegadinha:</b> inteiro teor já mostra os ônus — não precisa declará-los à parte.<br><br><b>📌 Fundamento:</b> arts. 17 a 19 da LRP.<br><br><b>🔁 Revisar:</b> certidão de inteiro teor dispensa declaração expressa de “inexistência de ônus”.<br><br><b>☑ Verificação:</b> Norma [arts. 17-19 LRP ✔] · Tese [N/A — letra de norma]."},
  {id:"q5", materia:"Registral — modalidades de certidão (LRP art. 19)", banca:"VUNESP · TJ-SP · 2024", tipo:'multipla', enunciado:"Quando o usuário solicita, por escrito, para que seja expedida certidão, da qual, além dos elementos previstos para a certidão em breve relatório, conste outros que ele indicar, é correto afirmar que a modalidade da certidão requerida é em:", alternativas:[{letra:"A",texto:"relatório, conforme quesitos."},{letra:"B",texto:"inteiro teor."},{letra:"C",texto:"inteiro teor parcial."},{letra:"D",texto:"resumo."}], correta:"A", comentario:"<b>✅ Gabarito: LETRA A</b>.<br><br><b>⚖️ Por quê:</b> o art. 19, §1º, da LRP admite a certidão em <b>inteiro teor, em resumo ou em relatório, conforme quesitos</b>. Quando o interessado especifica, por quesitos, quais elementos quer que constem, trata-se da certidão <b>em relatório (conforme quesitos)</b>.<br><br><b>As outras:</b> inteiro teor reproduz tudo; resumo traz os elementos essenciais padronizados; “inteiro teor parcial” não é a modalidade descrita.<br><br><b>⚠️ Pegadinha:</b> pedido por quesitos específicos = certidão <b>em relatório</b>.<br><br><b>📌 Fundamento:</b> art. 19, §1º, da Lei 6.015/73.<br><br><b>🔁 Revisar:</b> certidão em relatório atende a quesitos indicados pelo interessado.<br><br><b>☑ Verificação:</b> Norma [art. 19 LRP ✔] · Tese [N/A — letra de norma]."},
  {id:"q6", materia:"Registral — assinatura eletrônica/publicidade (LRP/Lei 14.063)", banca:"IESES · TJ-AM · 2023", tipo:'multipla', enunciado:"Acerca da publicidade no registro de imóveis, é incorreto afirmar, de acordo com a LRP:", alternativas:[{letra:"A",texto:"O interessado poderá solicitar a qualquer serventia certidões eletrônicas relativas a atos registrados em outra serventia, por meio do Sistema Eletrônico dos Registros Públicos (SERP)."},{letra:"B",texto:"A certidão de inteiro teor será extraída por meio reprográfico ou eletrônico, devendo ser fornecida eletronicamente, com uso de tecnologia que permita a sua autenticidade, e a identificação segura de sua autenticidade, conforme critérios estabelecidos pela Corregedoria Nacional de Justiça do CNJ, dispensada a materialização das certidões pelo oficial de registro."},{letra:"C",texto:"O acesso ou o envio de informações aos registros públicos, quando realizados por meio da internet, deverão ser assinados com o uso de assinatura simples, avançada ou qualificada de que trata o art. 4º da Lei 14.063/20, nos termos estabelecidos pela Corregedoria Nacional de Justiça do CNJ."},{letra:"D",texto:"A certidão da situação jurídica atualizada do imóvel compreende as informações vigentes sobre a descrição, número do contribuinte, proprietário, direitos, ônus e restrições, incidentes sobre o imóvel e o respectivo titular, além das demais informações necessárias à comprovação da propriedade e à transmissão e à constituição de outros direitos reais."}], correta:"C", comentario:"<b>✅ Gabarito: LETRA C</b> (a INCORRETA).<br><br><b>⚖️ Por quê:</b> a assinatura eletrônica admitida para acesso/envio de informações aos registros públicos é a <b>avançada ou qualificada</b> (art. 4º da Lei 14.063/2020) — <b>não</b> a “simples”. Incluir a assinatura simples torna a assertiva incorreta.<br><br><b>As outras:</b> reproduzem corretamente as certidões interconectadas pelo SERP (A), a certidão de inteiro teor eletrônica com dispensa de materialização (B) e a certidão de situação jurídica atualizada (D).<br><br><b>⚠️ Pegadinha:</b> assinatura <b>avançada ou qualificada</b> — a simples não basta.<br><br><b>📌 Fundamento:</b> art. 17 da LRP; art. 4º da Lei 14.063/2020.<br><br><b>🔁 Revisar:</b> acesso aos registros exige assinatura avançada ou qualificada (não simples).<br><br><b>☑ Verificação:</b> Norma [art. 17 LRP / Lei 14.063/20 ✔] · Tese [N/A — letra de norma]."},
  {id:"q7", materia:"Registral — certidões do RCPN (LRP arts. 19/20)", banca:"IESES · TJ-AM · 2023", tipo:'multipla', enunciado:"A certidão emitida pelo registro civil em inteiro teor, em resumo, ou em relatório, conforme quesitos, e devidamente autenticada pelo oficial ou seus substitutos legais, não podendo ser retardada por mais de 5 dias. Sobre as certidões emitidas pelo registro civil, analise cada um dos itens, se possuem afirmações verdadeiras ou falsas e assinale a alternativa correta.<br>I. As certidões do registro civil das pessoas naturais mencionarão a data em que foi lavrado o assento.<br>II. As certidões do registro civil deverão mencionar expressamente a circunstância de ser legítima, ou não, a filiação, independente de requerimento do interessado, ou de determinação judicial.<br>III. A certidão de inteiro teor será extraída por meio reprográfico ou eletrônico.<br>IV. As certidões de nascimento mencionarão a data em que foi feito o assento, a data, por extenso, do nascimento e, ainda, expressamente, a naturalidade.", alternativas:[{letra:"A",texto:"Todos os itens são afirmações falsas."},{letra:"B",texto:"Os itens I e IV possuem afirmações falsas."},{letra:"C",texto:"Todos os itens são afirmações verdadeiras."},{letra:"D",texto:"Somente a afirmação do item II é falsa."}], correta:"D", comentario:"<b>✅ Gabarito: LETRA D</b> (só o item II é falso).<br><br><b>⚖️ Por quê:</b> <b>I, III e IV</b> reproduzem fielmente os arts. 19 e 20 da LRP (data do assento, certidão de inteiro teor reprográfica/eletrônica e dados da certidão de nascimento). <b>II)</b> é falsa — é <b>vedado</b> mencionar na certidão a circunstância de ser legítima ou não a filiação (art. 45/proteção constitucional à igualdade dos filhos).<br><br><b>⚠️ Pegadinha:</b> nunca se menciona legitimidade/ilegitimidade da filiação na certidão.<br><br><b>📌 Fundamento:</b> arts. 19, 20 e 45 da LRP; art. 227, §6º, da CF.<br><br><b>🔁 Revisar:</b> item da “filiação legítima ou não” é sempre a pegadinha falsa.<br><br><b>☑ Verificação:</b> Norma [arts. 19/20/45 LRP ✔] · Tese [N/A — letra de norma]."},
  {id:"q8", materia:"Registral — certidão de inteiro teor (LRP art. 19)", banca:"Consulplan · TJ-AC · 2023", tipo:'multipla', enunciado:"Sobre a lavratura das certidões de acordo com o previsto na LRP, assinale a afirmativa correta.", alternativas:[{letra:"A",texto:"A certidão de inteiro teor será extraída por meio reprográfico ou eletrônico."},{letra:"B",texto:"As certidões de nascimento mencionarão a data em que ocorreu o nascimento, a data, por extenso, da lavratura do assento e, ainda, expressamente, a naturalidade."},{letra:"C",texto:"Nas certidões do registro civil, se mencionará a circunstância de ser legítima, ou não, a filiação, salvo a requerimento do próprio interessado, ou em virtude de determinação judicial."},{letra:"D",texto:"As certidões do registro civil das pessoas naturais mencionarão a data em que ocorreu o nascimento ou o registro, conforme se tiver esta a informação na Declaração de Nascido Vivo – DNV, caso não conste, deverá colher declaração, por escrito, do declarante de nascimento, afirmando a data do nascimento."}], correta:"A", comentario:"<b>✅ Gabarito: LETRA A</b>.<br><br><b>⚖️ Por quê:</b> o art. 19, §1º, da LRP prevê que a certidão de <b>inteiro teor</b> será extraída por meio <b>reprográfico ou eletrônico</b>.<br><br><b>As outras:</b> <b>B)</b> a certidão de nascimento menciona a data do <b>registro/assento</b> e a do nascimento por extenso — a redação confunde os elementos. <b>C)</b> é <b>vedado</b> mencionar a circunstância de filiação legítima ou não, sem exceção. <b>D)</b> a redação cria exigências estranhas à LRP.<br><br><b>⚠️ Pegadinha:</b> certidão de inteiro teor = reprográfica/eletrônica; nunca menciona legitimidade da filiação.<br><br><b>📌 Fundamento:</b> arts. 19, 20 e 45 da Lei 6.015/73.<br><br><b>🔁 Revisar:</b> inteiro teor por meio reprográfico/eletrônico (art. 19, §1º).<br><br><b>☑ Verificação:</b> Norma [arts. 19/20/45 LRP ✔] · Tese [N/A — letra de norma]."},
  {id:"q9", materia:"Registral — publicidade e sigilo (LRP art. 17; Lei 9.807/99)", banca:"Consulplan · TJ-AC · 2023", tipo:'multipla', enunciado:"As certidões são atos formais que atestam a existência de registros existentes nos cartórios. Segundo a LRP, com a redação dada pela Lei 9.807/99, a certidão será lavrada independentemente de despacho judicial, devendo mencionar o livro de registro ou o documento arquivado no cartório. Sobre o tema, assinale a afirmativa correta.", alternativas:[{letra:"A",texto:"Qualquer pessoa pode requerer certidão do registro sem informar ao oficial ou o motivo ou interesse do pedido, dispensada autorização."},{letra:"B",texto:"A certidão relativa à alteração de nome concedida em razão de fundada coação ou ameaça decorrente de colaboração com a apuração de crime poderá ser fornecida pelo oficial de cartório, dispensada autorização judicial."},{letra:"C",texto:"A certidão relativa ao nascimento de filho legitimado por subsequente matrimônio poderá ser fornecida pelo oficial de cartório com o teor da declaração ou averbação a esse respeito a qualquer pessoa, dispensada a autorização judicial."},{letra:"D",texto:"A certidão relativa ao registro de nascimentos decorrente de sentenças de legitimação adotiva poderá ser fornecida pelo oficial de cartório a qualquer pessoa interessada, dispensa autorização judicial, devendo ser consignados os nomes dos pais biológicos."}], correta:"A", comentario:"<b>✅ Gabarito: LETRA A</b>.<br><br><b>⚖️ Por quê:</b> o art. 17 da LRP consagra a <b>publicidade</b>: qualquer pessoa pode requerer certidão do registro <b>sem informar o motivo ou interesse</b>, independentemente de autorização.<br><br><b>As outras:</b> <b>B)</b> a certidão de alteração de nome por coação/colaboração (Lei 9.807/99) <b>depende de autorização judicial</b> (sigilo). <b>C)</b> não se fornece a “qualquer pessoa” o teor que revele a legitimação por matrimônio subsequente sem cautela. <b>D)</b> na adoção, é <b>vedado</b> consignar/expor os nomes dos pais biológicos (sigilo da origem).<br><br><b>⚠️ Pegadinha:</b> regra é a publicidade ampla; as exceções (coação, adoção) exigem autorização judicial/sigilo.<br><br><b>📌 Fundamento:</b> art. 17 da LRP; Lei 9.807/99; arts. 47/48 do ECA.<br><br><b>🔁 Revisar:</b> certidão sem declarar motivo; sigilo nas hipóteses de proteção e de adoção.<br><br><b>☑ Verificação:</b> Norma [art. 17 LRP / Lei 9.807/99 ✔] · Tese [N/A — letra de norma]."},
  {id:"q10", materia:"Registral — requerimento de certidão (LRP art. 17)", banca:"IESES · TJ-TO · 2022", tipo:'multipla', enunciado:"Quanto ao requerimento de uma certidão do registro nos termos da LRP:", alternativas:[{letra:"A",texto:"Qualquer pessoa pode requerer certidão do registro sem informar ao oficial ou ao funcionário o motivo ou interesse do pedido."},{letra:"B",texto:"Apenas o titular constante na certidão do registro poderá requerê-la."},{letra:"C",texto:"Apenas o titular constante na certidão do registro poderá requerê-la, ou terceiro munido de instrumento de procuração com fins específicos."},{letra:"D",texto:"Qualquer pessoa pode requerer certidão do registro, porém deverá informar ao oficial ou ao funcionário o motivo ou interesse do pedido."}], correta:"A", comentario:"<b>✅ Gabarito: LETRA A</b>.<br><br><b>⚖️ Por quê:</b> o art. 17 da LRP assegura que <b>qualquer pessoa</b> pode requerer certidão do registro <b>sem informar o motivo ou interesse</b> do pedido — princípio da publicidade dos registros públicos.<br><br><b>As outras:</b> restringem o pedido ao titular/procurador (B e C) ou exigem a declaração do motivo (D), o que contraria a publicidade.<br><br><b>⚠️ Pegadinha:</b> não se exige declarar o motivo nem comprovar interesse.<br><br><b>📌 Fundamento:</b> art. 17 da Lei 6.015/73.<br><br><b>🔁 Revisar:</b> certidão a qualquer pessoa, sem informar motivo (art. 17).<br><br><b>☑ Verificação:</b> Norma [art. 17 LRP ✔] · Tese [N/A — letra de norma]."},
  {id:"q11", materia:"Registral — conservação e saída dos livros (LRP art. 24)", banca:"IESES · TJ-PA · 2026", tipo:'multipla', enunciado:"Sobre a apresentação de livros e documentos do registro civil, conforme a LRP, assinale a alternativa correta.", alternativas:[{letra:"A",texto:"Basta autorização do titular para retirada dos livros."},{letra:"B",texto:"É permitida a retirada para digitalização externa, após o fechamento do protocolo."},{letra:"C",texto:"Somente o titular do cartório poderá andar com os livros livremente para fora das dependências da serventia, não sendo permitido aos substitutos."},{letra:"D",texto:"Todas as diligências ocorrerão no cartório, e os livros somente sairão mediante autorização judicial."},{letra:"E",texto:"Os livros podem sair livremente para diligências externas."}], correta:"D", comentario:"<b>✅ Gabarito: LETRA D</b>.<br><br><b>⚖️ Por quê:</b> a LRP impõe a <b>guarda permanente</b> dos livros na serventia: as diligências ocorrem <b>no próprio cartório</b> e os livros <b>somente sairão mediante autorização judicial</b> (art. 24 c/c art. 46). Não basta a vontade do titular.<br><br><b>As outras:</b> autorizam a saída por ato do titular (A), retirada para digitalização externa (B) ou livre circulação dos livros (C e E), todas vedadas.<br><br><b>⚠️ Pegadinha:</b> livro só sai do cartório com <b>autorização judicial</b>.<br><br><b>📌 Fundamento:</b> arts. 24 e 46 da Lei 6.015/73.<br><br><b>🔁 Revisar:</b> livros não saem da serventia salvo autorização judicial.<br><br><b>☑ Verificação:</b> Norma [arts. 24/46 LRP ✔] · Tese [N/A — letra de norma]."},
  {id:"q12", materia:"Registral — guarda e conservação (LRP arts. 22-26)", banca:"IESES · TJ-PA · 2026", tipo:'multipla', enunciado:"A LRP estabelece normas rigorosas sobre a guarda, conservação e apresentação dos documentos dos serviços de registro. Analise os itens, atribuindo-lhes verdadeiro ou falso, e assinale a alternativa que indica a sequência correta:<br>I. Os oficiais devem manter em segurança permanente os livros e documentos.<br>II. Os papéis referentes ao serviço do registro serão arquivados no cartório, facultada a utilização de microfilmagem e de outros meios de reprodução autorizados em lei.<br>III. Os livros e papéis pertencentes ao arquivo do cartório poderão ser eliminados após a digitalização integral do acervo.<br>IV. Os livros e fichas que os substituam somente sairão do cartório mediante autorização judicial.", alternativas:[{letra:"A",texto:"F, F, F, F."},{letra:"B",texto:"F, V, F, F."},{letra:"C",texto:"V, F, V, V."},{letra:"D",texto:"V, V, F, V."},{letra:"E",texto:"V, V, V, V."}], correta:"D", comentario:"<b>✅ Gabarito: LETRA D</b> (V, V, F, V).<br><br><b>⚖️ Por quê:</b> <b>I)</b> verdadeira — guarda em segurança permanente (art. 22). <b>II)</b> verdadeira — papéis arquivados no cartório, facultada a microfilmagem/reprodução (art. 25). <b>III)</b> <b>falsa</b> — os livros e papéis do arquivo são de <b>conservação permanente</b> e <b>não</b> podem ser eliminados pela só digitalização. <b>IV)</b> verdadeira — livros/fichas só saem do cartório por autorização judicial (art. 24).<br><br><b>⚠️ Pegadinha:</b> digitalizar <b>não</b> autoriza eliminar o acervo (conservação permanente).<br><br><b>📌 Fundamento:</b> arts. 22, 24 e 25 da LRP.<br><br><b>🔁 Revisar:</b> acervo é de conservação permanente; digitalização não permite descarte.<br><br><b>☑ Verificação:</b> Norma [arts. 22/24/25 LRP ✔] · Tese [N/A — letra de norma]."},
  {id:"q13", materia:"Registral — conservação dos documentos (LRP art. 22)", banca:"CEBRASPE · TJ-RR · 2025", tipo:'multipla', enunciado:"No que diz respeito à conservação de documentos dos serviços notariais e registrais, assinale a opção correta.", alternativas:[{letra:"A",texto:"Cabe ao CNJ instituir e gerenciar centrais de serviços eletrônicos para a sistematização e o tratamento digital de dados e informações dos serviços."},{letra:"B",texto:"A requerimento da parte interessada, o notário ou registrador pode autorizar a saída temporária, da serventia, dos livros de registro, para fins de consulta, por até 48 horas."},{letra:"C",texto:"Sendo necessário exame pericial de um livro ou documento do serviço, ele poderá ser realizado no próprio serviço ou no órgão de polícia científica, a critério do notário ou registrador."},{letra:"D",texto:"Os documentos do acervo de um serviço devem permanecer no arquivo deste por prazo indefinido, sob responsabilidade do delegatário."},{letra:"E",texto:"No caso de desmembramento de um serviço, enquanto o novo não for instalado, os atos continuarão a ser feitos naquele do qual resultou o desmembramento e, com a instalação do novo serviço, a este deverão ser enviados os documentos daqueles atos."}], correta:"D", comentario:"<b>✅ Gabarito: LETRA D</b>.<br><br><b>⚖️ Por quê:</b> o art. 22 da LRP impõe a <b>conservação permanente</b> (prazo indefinido) dos documentos do acervo no arquivo da serventia, sob responsabilidade do <b>delegatário</b>.<br><br><b>As outras:</b> <b>A)</b> a competência para instituir centrais eletrônicas e o SERP é regulada por lei/CNJ, mas a redação generaliza indevidamente. <b>B)</b> os livros <b>não</b> saem da serventia por mera consulta (só por autorização judicial — art. 24). <b>C)</b> o exame pericial ocorre <b>na sede do serviço</b>, mediante autorização do juízo (art. 46), não “a critério do notário”. <b>E)</b> a redação distorce a regra do desmembramento.<br><br><b>⚠️ Pegadinha:</b> acervo é de conservação permanente; livro não sai por consulta.<br><br><b>📌 Fundamento:</b> arts. 22, 24 e 46 da Lei 6.015/73.<br><br><b>🔁 Revisar:</b> documentos do acervo: conservação por prazo indefinido (art. 22).<br><br><b>☑ Verificação:</b> Norma [arts. 22/24/46 LRP ✔] · Tese [N/A — letra de norma]."},
  {id:"q14", materia:"Registral — guarda e conservação (LRP arts. 22-26)", banca:"FGV · Enac · 2025", tipo:'multipla', enunciado:"Após ser contratado para atuar, na qualidade de funcionário, em um Tabelionato de Notas, João foi devidamente orientado pelo tabelião sobre as normas que versam sobre a conservação dos livros, documentos e papéis em geral. Nesse cenário, considerando as disposições da LRP, é correto afirmar que:", alternativas:[{letra:"A",texto:"quando a lei criar um cartório, e enquanto este não for instalado, os registros continuarão a ser feitos no cartório que sofreu o desmembramento, sendo necessário repeti-los, em um prazo de 180 dias, prorrogável por igual período, no novo ofício."},{letra:"B",texto:"as diligências judiciais que exigirem a apresentação de qualquer livro, ficha substitutiva de livro ou documento serão efetuadas na sede da serventia judicial que determinou a medida, salvo decisão do juízo competente em sentido contrário."},{letra:"C",texto:"os papéis referentes ao serviço do registro serão arquivados em cartório mediante a utilização de processos racionais que facilitem as buscas, exigindo-se, para tanto, a utilização de microfilmagem."},{letra:"D",texto:"os livros de registro, bem como as fichas que os substituam somente sairão do respectivo cartório mediante autorização na esfera administrativa, por parte do CNJ."},{letra:"E",texto:"os oficiais devem manter em segurança, permanentemente, os livros e documentos, e respondem pela sua ordem e conservação."}], correta:"E", comentario:"<b>✅ Gabarito: LETRA E</b>.<br><br><b>⚖️ Por quê:</b> o art. 22 da LRP estabelece que os oficiais devem manter <b>permanentemente em segurança</b> os livros e documentos, <b>respondendo</b> por sua ordem e conservação — exatamente a letra E.<br><br><b>As outras:</b> <b>A)</b> a repetição dos registros no novo ofício e o prazo de “180 dias” não constam da lei. <b>B)</b> a apresentação de livros para diligência se faz <b>na sede da serventia</b> registral, não na “serventia judicial”. <b>C)</b> a microfilmagem é <b>facultada</b>, não exigida. <b>D)</b> a saída dos livros depende de autorização <b>judicial</b>, não administrativa do CNJ.<br><br><b>⚠️ Pegadinha:</b> microfilmagem é facultativa; saída de livro exige autorização judicial.<br><br><b>📌 Fundamento:</b> arts. 22, 24, 25 e 46 da LRP.<br><br><b>🔁 Revisar:</b> guarda permanente e responsabilidade do oficial pela conservação (art. 22).<br><br><b>☑ Verificação:</b> Norma [arts. 22/24/25/46 LRP ✔] · Tese [N/A — letra de norma]."},
  {id:"q15", materia:"Registral — guarda dos livros (LRP arts. 22-26)", banca:"IESES · TJ-AM · 2023", tipo:'multipla', enunciado:"A LRP estabelece que os livros de registro, bem como as fichas que os substituam somente sairão do respectivo cartório mediante autorização judicial. Assim, tendo em mente as normas legais sobre a conservação dos livros da serventia registral, analise cada uma das afirmações e escolha a alternativa que qualifica corretamente cada uma como verdadeira ou falsa.<br>I. Os oficiais devem manter em segurança, permanentemente, os livros e documentos e respondem pela sua ordem e conservação.<br>II. Os papéis referentes ao serviço do registro serão arquivados em cartório mediante a utilização de processos racionais que facilitem as buscas, facultada a utilização de microfilmagem e de outros meios de reprodução autorizados em lei.<br>III. Os livros e papéis pertencentes ao arquivo do cartório ali permanecerão indefinidamente.<br>IV. Quando a lei criar novo cartório, e enquanto este não for instalado, os registros continuarão a ser feitos no cartório que sofreu o desmembramento, não sendo necessário repeti-los no novo ofício e o arquivo do antigo cartório continuará a pertencer-lhe.", alternativas:[{letra:"A",texto:"Todos os itens são afirmações verdadeiras."},{letra:"B",texto:"Os itens II e III são afirmações falsas."},{letra:"C",texto:"Somente os itens III e IV são afirmações verdadeiras."},{letra:"D",texto:"Todos os itens são afirmações falsas."}], correta:"A", comentario:"<b>✅ Gabarito: LETRA A</b> (todos verdadeiros).<br><br><b>⚖️ Por quê:</b> os quatro itens reproduzem fielmente os arts. 22 a 26 da LRP: guarda permanente e responsabilidade do oficial (I — art. 22); arquivamento por processos racionais, facultada a microfilmagem (II — art. 25); permanência indefinida do acervo no cartório (III — conservação permanente); e, no desmembramento, manutenção dos registros no cartório de origem até a instalação do novo, sem repetição, permanecendo o arquivo antigo (IV — art. 26).<br><br><b>⚠️ Pegadinha:</b> microfilmagem é <b>facultada</b>; acervo permanece indefinidamente.<br><br><b>📌 Fundamento:</b> arts. 22, 24, 25 e 26 da Lei 6.015/73.<br><br><b>🔁 Revisar:</b> guarda permanente + microfilmagem facultativa + acervo indefinido (arts. 22-26).<br><br><b>☑ Verificação:</b> Norma [arts. 22-26 LRP ✔] · Tese [N/A — letra de norma]."}

function defaultState(){return{respostas:{},revisao:{},caderno:{},revisarDepois:{},posicao:0,modo:'todas',materiaFiltro:'',notas:{}};}
let state=defaultState(),lista=[],paused=false,qSecs=0,sSecs=0,timerInterval=null,commentOpen={};
function saveState(){try{localStorage.setItem(STORE_KEY,JSON.stringify(state));}catch(e){}}
function loadState(){try{var raw=localStorage.getItem(STORE_KEY);if(raw){state=Object.assign(defaultState(),JSON.parse(raw));}}catch(e){state=defaultState();}}
function today(){return new Date().toISOString().split('T')[0];}
function addDays(d,n){var dt=new Date(d+'T12:00:00');dt.setDate(dt.getDate()+n);return dt.toISOString().split('T')[0];}
function fmtDate(iso){if(!iso)return'';var p=iso.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function shuffle(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function buildLista(){var t=today(),ids;if(state.modo==='todas'){ids=QUESTOES.map(function(q){return q.id;});}else if(state.modo==='hoje'){ids=QUESTOES.filter(function(q){var r=state.revisao[q.id];return r&&r.nextDate&&r.nextDate<=t;}).map(function(q){return q.id;});}else if(state.modo==='caderno'){ids=QUESTOES.filter(function(q){return state.caderno[q.id]||state.revisarDepois[q.id];}).map(function(q){return q.id;});}else if(state.modo==='materia'){var m=state.materiaFiltro;ids=QUESTOES.filter(function(q){return !m||q.materia===m;}).map(function(q){return q.id;});}else if(state.modo==='aleatorio'){ids=shuffle(QUESTOES.map(function(q){return q.id;}));}else{ids=QUESTOES.map(function(q){return q.id;});}return ids;}
function computeStats(){var total=QUESTOES.length,acertos=0,erros=0,t=today(),revisadasHoje=0;QUESTOES.forEach(function(q){var r=state.respostas[q.id];if(r){if(r===q.correta)acertos++;else erros++;}var rev=state.revisao[q.id];if(rev&&rev.lastAnswered===t)revisadasHoje++;});var respondidas=acertos+erros,pendentes=total-respondidas,pct=total>0?Math.round(respondidas/total*100):0;return{total:total,acertos:acertos,erros:erros,pendentes:pendentes,revisadasHoje:revisadasHoje,respondidas:respondidas,pct:pct};}
function renderStats(){var s=computeStats();document.getElementById('statsBar').innerHTML='<div class="stat-chip"><span class="sv green">'+s.acertos+'</span><span class="sl">Acertos</span></div><div class="stat-chip"><span class="sv red">'+s.erros+'</span><span class="sl">Erros</span></div><div class="stat-chip"><span class="sv amber">'+s.pendentes+'</span><span class="sl">Pendentes</span></div><div class="stat-chip"><span class="sv cyan">'+s.revisadasHoje+'</span><span class="sl">Revisadas hoje</span></div>';var fill=document.getElementById('progressFill'),lbl=document.getElementById('progressLabel');if(fill)fill.style.width=s.pct+'%';if(lbl)lbl.textContent=s.respondidas+'/'+s.total+' respondidas ('+s.pct+'%)';}
function fmtTime(secs){return String(Math.floor(secs/60)).padStart(2,'0')+':'+String(secs%60).padStart(2,'0');}
function startTimers(){if(timerInterval)clearInterval(timerInterval);timerInterval=setInterval(function(){if(!paused){qSecs++;sSecs++;}var q=document.getElementById('timerQ'),s=document.getElementById('timerS');if(q)q.textContent=fmtTime(qSecs);if(s)s.textContent=fmtTime(sSecs);},1000);}
function resetQTimer(){qSecs=0;var q=document.getElementById('timerQ');if(q)q.textContent='00:00';}
function togglePause(){paused=!paused;var b=document.getElementById('btnPause');if(b)b.textContent=paused?'Retomar':'Pausar';}
function scheduleNext(id,acertou){var t=today(),rv=state.revisao[id]||{nextDate:null,interval:1,acertos:0,lastAnswered:null};rv.lastAnswered=t;if(acertou){rv.acertos=(rv.acertos||0)+1;rv.interval=rv.acertos===1?1:rv.acertos===2?7:30;}else{rv.acertos=0;rv.interval=1;}rv.nextDate=addDays(t,rv.interval);state.revisao[id]=rv;}
function scheduleManual(id,days){var t=today(),rv=state.revisao[id]||{nextDate:null,interval:days,acertos:0,lastAnswered:t};rv.nextDate=days===0?null:addDays(t,days);rv.interval=days;state.revisao[id]=rv;saveState();renderCard();}
function reviewBadgeHTML(id){var rv=state.revisao[id];if(!rv||!rv.nextDate)return'';if(rv.nextDate<=today())return'<span class="review-badge review-today">revisar hoje ⏰</span>';return'<span class="review-badge review-future">📅 '+fmtDate(rv.nextDate)+'</span>';}
function schedRowHTML(id){return'<div class="sched-row"><span class="sched-label">Agendar:</span><button class="sched-btn" onclick="scheduleManual(\''+id+'\',1)">1 dia</button><button class="sched-btn" onclick="scheduleManual(\''+id+'\',7)">7 dias</button><button class="sched-btn" onclick="scheduleManual(\''+id+'\',30)">30 dias</button><button class="sched-btn remove" onclick="scheduleManual(\''+id+'\',0)">remover</button></div>';}
function starBtnHTML(id){var active=state.revisarDepois[id]?' active':'',label=state.revisarDepois[id]?'⭐ No caderno':'☆ Revisar depois';return'<button class="star-btn'+active+'" onclick="toggleStar(\''+id+'\')">'+label+'</button>';}
function toggleStar(id){if(state.revisarDepois[id])delete state.revisarDepois[id];else state.revisarDepois[id]=true;saveState();renderCard();renderStats();}
function selecionarAlternativa(id,letra){if(state.respostas[id])return;document.querySelectorAll('.alt-btn[data-id="'+id+'"]').forEach(function(b){b.classList.remove('selected');});var btn=document.querySelector('.alt-btn[data-id="'+id+'"][data-letra="'+letra+'"]');if(btn)btn.classList.add('selected');var c=document.getElementById('confirm-'+id);if(c)c.disabled=false;}
function syncResultado(){try{var total=QUESTOES.length,acertos=0,erradas=[];QUESTOES.forEach(function(q){var r=state.respostas[q.id];if(r){if(r===q.correta){acertos++;}else{erradas.push({id:q.id,enunciado:q.enunciado,gabarito:q.correta,resposta:r,alternativas:q.alternativas,comentario:q.comentario});}}});var m=(SLUG.match(/meta(\d+)/)||[])[1];fetch('https://danielbesis-site.vercel.app/api/resultado',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:(function(){try{var u=new URLSearchParams(location.search).get("uid");if(u){localStorage.setItem("db_uid",u);return u;}return localStorage.getItem("db_uid")||null;}catch(e){return null;}})(),slug:SLUG,metaNumero:m?parseInt(m,10):null,respostas:state.respostas,total:total,acertos:acertos,erradas:erradas})}).catch(function(){});}catch(e){}}
function confirmar(id){var q=QUESTOES.find(function(x){return x.id===id;});if(!q)return;var sel=document.querySelector('.alt-btn[data-id="'+id+'"].selected');if(!sel)return;var letra=sel.dataset.letra;state.respostas[id]=letra;var acertou=letra===q.correta;scheduleNext(id,acertou);if(!acertou)state.caderno[id]=true;saveState();syncResultado();renderCard();renderStats();}
function toggleComment(id){commentOpen[id]=!commentOpen[id];var body=document.getElementById('comment-body-'+id),tog=document.getElementById('comment-toggle-'+id);if(body)body.classList.toggle('open',!!commentOpen[id]);if(tog)tog.textContent=commentOpen[id]?'▲ Ocultar comentário':'▼ Ver comentário / gabarito (ICOL)';}
function salvarNota(id,txt){if(!state.notas)state.notas={};state.notas[id]=txt;saveState();}
function renderCard(){var cont=document.getElementById('mainContent');if(!lista.length){cont.innerHTML='<div class="empty-state"><div class="icon">📭</div><div>Nenhuma questão neste filtro.</div></div>';return;}var pos=Math.min(Math.max(state.posicao,0),lista.length-1);state.posicao=pos;var id=lista[pos],q=QUESTOES.find(function(x){return x.id===id;});if(!q){cont.innerHTML='';return;}var resposta=state.respostas[id],respondida=!!resposta,acertou=respondida&&resposta===q.correta;var resultHTML='';if(respondida){resultHTML=acertou?'<div class="result-banner correct">✅ Correto! Resposta: '+resposta+'</div>':'<div class="result-banner wrong">❌ Incorreto. Sua resposta: '+resposta+' | Gabarito: '+q.correta+'</div>';}var altsHTML='<div class="alts">';q.alternativas.forEach(function(alt){var btnCls='alt-btn',letraCls='alt-letra',disabled=respondida?'disabled':'';if(respondida){if(alt.letra===q.correta&&alt.letra===resposta){btnCls='alt-btn correct';letraCls='alt-letra correct';}else if(alt.letra===q.correta){btnCls='alt-btn reveal-correct';letraCls='alt-letra reveal-correct';}else if(alt.letra===resposta){btnCls='alt-btn wrong';letraCls='alt-letra wrong';}}altsHTML+='<button class="'+btnCls+'" data-id="'+id+'" data-letra="'+alt.letra+'" '+disabled+' onclick="selecionarAlternativa(\''+id+'\',\''+alt.letra+'\')"><span class="'+letraCls+'">'+alt.letra+'</span><span>'+alt.texto+'</span></button>';});altsHTML+='</div>';var confirmHTML=respondida?'':'<button class="btn-confirm" id="confirm-'+id+'" onclick="confirmar(\''+id+'\')" disabled>Confirmar</button>';var cOpen=commentOpen[id]?' open':'',cLabel=commentOpen[id]?'▲ Ocultar comentário':'▼ Ver comentário / gabarito (ICOL)';var commentHTML=respondida?'<div class="comment-wrap"><button class="comment-toggle" id="comment-toggle-'+id+'" onclick="toggleComment(\''+id+'\')">'+cLabel+'</button><div class="comment-body'+cOpen+'" id="comment-body-'+id+'">'+q.comentario+'</div></div>':'';var schedHTML=respondida?schedRowHTML(id):'';var notaVal=(state.notas&&state.notas[id])?state.notas[id]:'';var notasHTML='<div class="notas-wrap"><div class="notas-label">📝 Minhas anotações</div><textarea class="notas-area" placeholder="Escreva aqui suas anotações sobre esta questão…" oninput="salvarNota(\''+id+'\', this.value)">'+notaVal.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</textarea></div>';cont.innerHTML='<div class="nav-counter">Questão '+(pos+1)+' de '+lista.length+'</div><div class="card"><div class="card-meta"><span class="badge badge-banca">'+q.banca+'</span><span class="badge badge-materia">'+q.materia+'</span>'+reviewBadgeHTML(id)+starBtnHTML(id)+claudeBtnHTML(id)+'</div><div class="enunciado">'+q.enunciado+'</div>'+altsHTML+confirmHTML+resultHTML+commentHTML+schedHTML+notasHTML+'</div><div class="nav-row"><button class="nav-btn" onclick="navPrev()" '+(pos===0?'disabled':'')+'>← Anterior</button><button class="nav-btn" onclick="navNext()" '+(pos>=lista.length-1?'disabled':'')+'>Próxima →</button></div>';}
function navPrev(){if(state.posicao>0){state.posicao--;saveState();resetQTimer();renderCard();}}
function navNext(){if(state.posicao<lista.length-1){state.posicao++;saveState();resetQTimer();renderCard();}}
function setModo(modo){state.modo=modo;state.posicao=0;var sel=document.getElementById('materiaSelect');if(sel)sel.style.display=modo==='materia'?'':'none';document.querySelectorAll('.mode-btn').forEach(function(b){b.classList.toggle('active',b.dataset.modo===modo);});lista=buildLista();saveState();resetQTimer();renderCard();renderStats();}
function setMateriaFiltro(val){state.materiaFiltro=val;state.posicao=0;lista=buildLista();saveState();resetQTimer();renderCard();}
function populateMateriaSelect(){var materias=[];QUESTOES.forEach(function(q){if(materias.indexOf(q.materia)===-1)materias.push(q.materia);});materias.sort();var sel=document.getElementById('materiaSelect');if(!sel)return;sel.innerHTML='<option value="">— Escolha —</option>';materias.forEach(function(m){var o=document.createElement('option');o.value=m;o.textContent=m;if(m===state.materiaFiltro)o.selected=true;sel.appendChild(o);});}
function recomecar(){if(confirm('Tem certeza? Todo o progresso será apagado permanentemente.')){localStorage.removeItem(STORE_KEY);location.reload();}}
function exportarProgresso(){var blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='progresso_'+SLUG+'_'+today()+'.json';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);}
function exportarNotas(){var txt='ANOTAÇÕES — '+document.title+'\n'+today()+'\n\n',n=0;QUESTOES.forEach(function(q){var nota=state.notas&&state.notas[q.id];if(nota&&nota.trim()){n++;txt+='【'+q.banca+' · '+q.materia+'】\n'+nota.trim()+'\n\n';}});if(!n){alert('Você ainda não tem anotações registradas.');return;}var blob=new Blob([txt],{type:'text/plain;charset=utf-8'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='anotacoes_'+SLUG+'_'+today()+'.txt';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);}
function importarProgresso(evt){var file=evt.target.files[0];if(!file)return;var reader=new FileReader();reader.onload=function(e){try{state=Object.assign(defaultState(),JSON.parse(e.target.result));saveState();lista=buildLista();populateMateriaSelect();document.querySelectorAll('.mode-btn').forEach(function(b){b.classList.toggle('active',b.dataset.modo===state.modo);});var sel=document.getElementById('materiaSelect');if(sel)sel.style.display=state.modo==='materia'?'':'none';renderStats();renderCard();alert('Progresso importado com sucesso!');}catch(err){alert('Arquivo inválido ou corrompido.');}};reader.readAsText(file);evt.target.value='';}
function dismissIframeBanner(){var b=document.getElementById('bannerIframe');if(b)b.style.display='none';try{sessionStorage.setItem('iframe_banner_dismissed','1');}catch(e){}}
function checkIframeBanner(){try{if(sessionStorage.getItem('iframe_banner_dismissed')==='1'){var b=document.getElementById('bannerIframe');if(b)b.style.display='none';}}catch(e){}}
function init(){loadState();checkIframeBanner();populateMateriaSelect();document.querySelectorAll('.mode-btn').forEach(function(b){b.classList.toggle('active',b.dataset.modo===state.modo);});var sel=document.getElementById('materiaSelect');if(sel&&state.modo==='materia')sel.style.display='';lista=buildLista();renderStats();renderCard();startTimers();}
function claudeBtnHTML(id){return '<button class="claude-qbtn" onclick="askClaude(\''+id+'\')">🤖</button>';}
function askClaude(id){var q=QUESTOES.find(function(x){return x.id===id;});if(!q)return;var ctx=document.title+' · Questão '+id+'\nTema: '+q.materia+'\nBanca: '+(q.banca||'')+'\nConcurso: Cartório TJMT\n\nEnunciado:\n'+q.enunciado.replace(/<[^>]+>/g,'')+'\n\nTenho uma dúvida sobre esta questão:\n';navigator.clipboard.writeText(ctx).catch(function(){});window.open('https://claude.ai','_blank');}
init();

window.addEventListener("load",function(){try{syncResultado();}catch(e){}});/*sync-on-load*/
</script>
</body>
</html>
