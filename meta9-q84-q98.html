<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meta 9 · Civil — Q84 a Q98</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#050b18;color:#c9d6e8;font-family:'Segoe UI',system-ui,sans-serif;font-size:15px;min-height:100vh}
a{color:#38bdf8}
button{cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;border:none;outline:none;font-family:inherit}

/* Banners */
.banner-save{background:#0d2040;border-bottom:1px solid #16365a;padding:8px 14px;font-size:12px;color:#7aa3cc;text-align:center;position:sticky;top:0;z-index:100}
.banner-iframe{background:#1a1200;border-bottom:1px solid #4a3200;padding:8px 14px;font-size:12px;color:#d4a84b;display:flex;justify-content:space-between;align-items:center;gap:8px}
.banner-iframe button{background:none;color:#d4a84b;font-size:16px;line-height:1;padding:0 4px;border:none;cursor:pointer}

/* Header */
.header{padding:16px 14px 0}
.header h1{font-size:18px;font-weight:700;color:#e8f0fb;margin-bottom:12px}

/* Timer */
.timer-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:13px;color:#7aa3cc;margin-bottom:12px}
.timer-bar span.time-val{color:#38bdf8;font-variant-numeric:tabular-nums;font-weight:600}
.timer-btn{background:#0b1828;border:1px solid #16365a;color:#7aa3cc;padding:3px 10px;border-radius:6px;font-size:12px}
.timer-btn:hover{border-color:#38bdf8;color:#38bdf8}

/* Stats */
.stats-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.stat-chip{background:#0b1828;border:1px solid #16365a;border-radius:8px;padding:5px 11px;font-size:12px;display:flex;flex-direction:column;align-items:center;gap:1px}
.stat-chip .sv{font-size:18px;font-weight:700;line-height:1.1}
.stat-chip .sl{font-size:10px;color:#55738e;text-transform:uppercase;letter-spacing:.5px}
.sv.green{color:#27c06a}.sv.red{color:#f25555}.sv.amber{color:#f5a623}.sv.cyan{color:#38bdf8}
.progress-wrap{margin-bottom:14px}
.progress-bar{height:5px;background:#0b1828;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#27c06a,#38bdf8);border-radius:3px;transition:width .4s}
.progress-label{font-size:11px;color:#55738e;margin-top:3px}

/* Mode selector */
.mode-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.mode-btn{background:#0b1828;border:1px solid #16365a;color:#7aa3cc;padding:5px 12px;border-radius:20px;font-size:12px;transition:all .2s}
.mode-btn.active{background:#16365a;border-color:#38bdf8;color:#38bdf8;font-weight:600}
.mode-btn:hover:not(.active){border-color:#38bdf8;color:#c9d6e8}
.materia-select{background:#0b1828;border:1px solid #16365a;color:#c9d6e8;padding:5px 10px;border-radius:20px;font-size:12px;outline:none}
.materia-select:focus{border-color:#38bdf8}

/* Action row */
.action-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.btn-sm{background:#0b1828;border:1px solid #16365a;color:#7aa3cc;padding:5px 12px;border-radius:8px;font-size:12px;transition:all .2s}
.btn-sm:hover{border-color:#38bdf8;color:#c9d6e8}
.btn-danger{border-color:#f25555;color:#f25555}
.btn-danger:hover{background:#2a0808}

/* Card */
.card{background:#0b1828;border:1px solid #16365a;border-radius:14px;padding:20px;margin:0 0 12px}
.card-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.badge{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.4px}
.badge-id{background:#16365a;color:#38bdf8}
.badge-materia{background:#0d2040;color:#7aa3cc;border:1px solid #16365a}
.badge-anulada{background:#2a1e00;color:#f5a623;border:1px solid #4a3200}
.review-badge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600}
.review-today{background:#2a1e00;color:#f5a623}
.review-future{background:#0b1828;color:#55738e;border:1px solid #16365a}
.enunciado{font-size:15px;line-height:1.6;color:#d8e8f8;margin-bottom:16px}
.nav-counter{text-align:right;font-size:12px;color:#55738e;margin-bottom:8px}

/* Alternativas */
.alts{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.alt-btn{background:#050b18;border:1.5px solid #16365a;color:#b8cce0;padding:11px 14px;border-radius:10px;text-align:left;font-size:14px;line-height:1.4;transition:all .15s;display:flex;gap:10px;align-items:flex-start;width:100%}
.alt-btn .alt-letra{font-weight:700;min-width:18px;color:#38bdf8;flex-shrink:0}
.alt-btn:hover:not(:disabled){border-color:#38bdf8;background:#0b1828}
.alt-btn.selected{border-color:#b06bf2;background:#1a0d28}
.alt-btn.correct{border-color:#27c06a!important;background:#0a2018!important;color:#7fffa8!important}
.alt-btn.wrong{border-color:#f25555!important;background:#200a0a!important;color:#ffaaaa!important}
.alt-btn.reveal-correct{border-color:#27c06a;background:#0a2018;color:#7fffa8}
.alt-btn:disabled{cursor:default;opacity:.85}
.alt-letra.correct{color:#27c06a!important}
.alt-letra.wrong{color:#f25555!important}
.alt-letra.reveal-correct{color:#27c06a}

/* Confirm button */
.btn-confirm{width:100%;padding:12px;border-radius:10px;font-size:15px;font-weight:700;background:#16365a;color:#e8f0fb;border:1.5px solid #2a5a8a;transition:all .2s;margin-bottom:10px}
.btn-confirm:hover:not(:disabled){background:#1e4a7a;border-color:#38bdf8}
.btn-confirm:disabled{opacity:.4;cursor:default}

/* Result banner */
.result-banner{padding:12px 16px;border-radius:10px;font-size:14px;font-weight:600;margin-bottom:12px}
.result-banner.correct{background:#0a2018;border:1.5px solid #27c06a;color:#7fffa8}
.result-banner.wrong{background:#200a0a;border:1.5px solid #f25555;color:#ffaaaa}
.result-banner.anulada{background:#2a1e00;border:1.5px solid #f5a623;color:#f5a623}

/* Comment */
.comment-wrap{margin-bottom:12px}
.comment-toggle{background:#0d1e32;border:1px solid #16365a;color:#7aa3cc;padding:8px 14px;border-radius:8px;font-size:13px;width:100%;text-align:left;transition:all .2s}
.comment-toggle:hover{border-color:#38bdf8;color:#c9d6e8}
.comment-body{background:#040c1c;border:1px solid #16365a;border-top:none;border-radius:0 0 8px 8px;padding:14px;font-size:13px;line-height:1.7;color:#b8cce0;display:none}
.comment-body.open{display:block}

/* Scheduling */
.sched-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.sched-label{font-size:11px;color:#55738e;margin-right:2px}
.sched-btn{padding:5px 11px;border-radius:8px;font-size:12px;font-weight:600;border:1.5px solid #4a3200;color:#f5a623;background:#1a1200;transition:all .2s}
.sched-btn:hover{background:#2a1e00;border-color:#f5a623}
.sched-btn.remove{border-color:#16365a;color:#55738e;background:#050b18}
.sched-btn.remove:hover{border-color:#f25555;color:#f25555}

/* Notebook / star */
.star-btn{padding:6px 13px;border-radius:8px;font-size:12px;font-weight:600;border:1.5px solid #16365a;color:#55738e;background:#050b18;transition:all .2s}
.star-btn.active{border-color:#b06bf2;color:#b06bf2;background:#160d24}
.star-btn:hover{border-color:#b06bf2;color:#b06bf2}

/* Navigation */
.nav-row{display:flex;justify-content:space-between;gap:8px;margin-top:4px}
.nav-btn{flex:1;padding:10px;border-radius:10px;font-size:14px;font-weight:600;background:#0b1828;border:1.5px solid #16365a;color:#7aa3cc;transition:all .2s;max-width:48%}
.nav-btn:hover:not(:disabled){border-color:#38bdf8;color:#c9d6e8}
.nav-btn:disabled{opacity:.35;cursor:default}

/* Empty state */
.empty-state{text-align:center;padding:48px 20px;color:#55738e;font-size:14px}
.empty-state .icon{font-size:40px;margin-bottom:12px}

/* Export/import */
.io-row{display:flex;gap:6px;flex-wrap:wrap}
.btn-io{background:#0b1828;border:1px solid #16365a;color:#7aa3cc;padding:6px 13px;border-radius:8px;font-size:12px;transition:all .2s}
.btn-io:hover{border-color:#38bdf8;color:#c9d6e8}
#fileInput{display:none}

footer{padding:16px 14px 28px;text-align:center;font-size:11px;color:#2a4060}

@media(max-width:480px){
  .stats-bar{gap:6px}
  .stat-chip{padding:4px 8px}
  .stat-chip .sv{font-size:16px}
}
  .notas-wrap{margin-top:14px;border-top:1px dashed #1b3550;padding-top:12px}
  .notas-label{font-size:12px;font-weight:700;color:#fbbf24;margin-bottom:7px}
  .notas-area{width:100%;min-height:70px;resize:vertical;background:#0b1828;border:1px solid #16365a;border-radius:10px;color:#dbe7f5;font-size:13.5px;font-family:inherit;line-height:1.5;padding:10px 12px;outline:none;transition:border .2s}
  .notas-area:focus{border-color:#fbbf24;box-shadow:0 0 0 2px rgba(251,191,36,.18)}
  .notas-area::placeholder{color:#3a5474}
</style>
</head>

<script>
const STORE_KEY = 'concurso_q84_q98_v2';

function syncResultado(){
  try{
    var total=QUESTOES.length, acertos=0, erradas=[];
    QUESTOES.forEach(function(q){
      var r=state.respostas[q.id];
      if(r==null) return;
      var letra=(typeof r==="object")?r.letra:r;
      if(!letra || letra==="ANULADA") return;
      if(letra===q.correta) acertos++;
      else erradas.push({id:q.id, enunciado:q.enunciado, gabarito:q.correta, resposta:letra, alternativas:q.alternativas, comentario:q.comentario});
    });
    var slug=(typeof SLUG!=="undefined"?SLUG:STORE_KEY.replace(/^concurso_/,""));
    fetch("https://danielbesis-site.vercel.app/api/resultado",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({slug:slug, metaNumero:9, respostas:state.respostas, total:total, acertos:acertos, erradas:erradas})
    }).catch(function(){});
  }catch(e){}
}

const QUESTOES = [
  {id:'q84', materia:'Obrigações', tipo:'multipla',
   enunciado:`Sobre as obrigações alternativas, analise as assertivas:<br><br>I. A escolha cabe ao credor como regra, salvo estipulação contrária.<br>II. Nas obrigações divisíveis, o devedor pode obrigar o credor a receber parte em uma prestação e parte em outra, como regra.<br>III. Quando a obrigação for de prestações periódicas, a faculdade de opção poderá ser exercida em cada período.<br><br>Assinale a correta:`,
   alternativas:[{letra:'A',texto:'I e II'},{letra:'B',texto:'I, II e III'},{letra:'C',texto:'II e III'},{letra:'D',texto:'Apenas a assertiva III está correta'}],
   correta:'D',
   comentario:`<b>⚖️ Por quê (D — só III):</b> art. 252, §2º — nas prestações periódicas a opção é exercida em cada período. III é a letra da lei.<br><br><b>⚠️ As erradas:</b> I — a escolha cabe ao DEVEDOR (art. 252, caput); II — art. 252, §1º: o devedor não pode obrigar o credor a receber parte em uma prestação e parte em outra.<br><br><b>📌 Norma:</b> art. 252 (caput, §§1º e 2º) CC | QConcursos Q2272720`},

  {id:'q85', materia:'Contratos em geral', tipo:'multipla',
   enunciado:`Considerando o art. 422 e seguintes do CC, marque a alternativa INCORRETA:`,
   alternativas:[{letra:'A',texto:'Não pode ser objeto de contrato a herança de pessoa viva'},{letra:'B',texto:'É lícito estipular contratos atípicos, observadas as normas gerais'},{letra:'C',texto:'Nos contratos de adesão, são nulas as cláusulas de renúncia antecipada do aderente a direito resultante da natureza do negócio'},{letra:'D',texto:'Os contratantes são obrigados a respeitar, na conclusão do contrato, todas as cláusulas do contrato'},{letra:'E',texto:'Havendo cláusulas ambíguas ou contraditórias no contrato de adesão, adota-se a interpretação mais favorável ao aderente'}],
   correta:'D',
   comentario:`<b>⚖️ Por quê (D é a incorreta):</b> distorce o art. 422 — os contratantes devem GUARDAR os princípios de probidade e boa-fé, não "respeitar todas as cláusulas".<br><br><b>✅ As corretas:</b> (A) art. 426; (B) art. 425; (C) art. 424; (E) art. 423.<br><br><b>⚠️ Pegadinha:</b> D soa razoável, mas o art. 422 trata de boa-fé objetiva.<br><br><b>📌 Norma:</b> arts. 422–426 CC | QConcursos Q3811857`},

  {id:'q86', materia:'Vícios redibitórios', tipo:'multipla',
   enunciado:`Carlos, ciente de que o imóvel deveria ser demolido por graves problemas estruturais, vendeu-o a João (R$ 500 mil), que desconhecia a situação. Seis meses após a tradição, João é notificado pela defesa civil. Nesse caso, João:`,
   alternativas:[{letra:'A',texto:'Só abatimento, sem rescisão/perdas e danos'},{letra:'B',texto:'Nem rescisão nem perdas e danos (prazo decadencial)'},{letra:'C',texto:'Sem rescisão (prazo decadencial), mas com reparação de danos'},{letra:'D',texto:'Rescisão + restituição, mas sem indenização (prazo decadencial)'},{letra:'E',texto:'Poderá exigir a rescisão e a restituição dos valores pagos, com perdas e danos, ou optar por permanecer com o imóvel e reclamar o abatimento'}],
   correta:'E',
   comentario:`<b>⚖️ Por quê (E):</b> vício oculto = vício redibitório (art. 441). João pode redibir (art. 442) ou pedir abatimento. Como Carlos CONHECIA o vício (má-fé), responde por restituição + perdas e danos (art. 443).<br><br><b>⏱ Prazo:</b> imóvel = 1 ano (art. 445); só 6 meses → não decaiu.<br><br><b>⚠️ Pegadinha:</b> o "prazo decadencial" (B/C/D) é a isca — imóvel decai em 1 ano; e o vendedor sabia, então cabem perdas e danos.<br><br><b>📌 Norma:</b> arts. 441–445 CC | QConcursos Q3775475`},

  {id:'q87', materia:'Teoria da imprevisão', tipo:'multipla',
   enunciado:`Empresa recreativa obteve empréstimo bancário (carência de 12 meses + 60 prestações) para ampliar seu parque. Uma crise mundial de saúde pública inviabilizou seus serviços. Constitui direito da empresa devedora:`,
   alternativas:[{letra:'A',texto:'Exigir a suspensão do pagamento das prestações'},{letra:'B',texto:'Exigir a prorrogação da carência'},{letra:'C',texto:'Exigir resolução + suspensão das obrigações'},{letra:'D',texto:'Restituir 50% e pagar a diferença sem juros'},{letra:'E',texto:'Pedir a resolução do contrato ou a revisão de cláusulas, dada a nova realidade econômica'}],
   correta:'E',
   comentario:`<b>⚖️ Por quê (E):</b> contrato de execução continuada + pandemia (fato extraordinário e imprevisível) → onerosidade excessiva → teoria da imprevisão. O devedor pede RESOLUÇÃO (art. 478) ou REVISÃO (arts. 479/317).<br><br><b>⚠️ As outras:</b> inventam soluções sem amparo legal.<br><br><b>📌 Norma:</b> arts. 478–480 CC | QConcursos Q3775828`},

  {id:'q88', materia:'Interpretação do NJ', tipo:'multipla',
   enunciado:`No que diz respeito às cláusulas contratuais em negócio jurídico, as partes:`,
   alternativas:[{letra:'A',texto:'Podem pactuar regras de interpretação diversas das previstas em lei, nos contratos por instrumento público ou particular'},{letra:'B',texto:'Podem pactuar somente quando se tratar de bens móveis ou semoventes'},{letra:'C',texto:'Podem pactuar somente quando o negócio não envolver incapazes'},{letra:'D',texto:'Não podem pactuar regras de interpretação diversas das previstas em lei'},{letra:'E',texto:'Podem pactuar somente quando firmado por instrumento público'}],
   correta:'A',
   comentario:`<b>⚖️ Por quê (A):</b> art. 113, §2º (Lei da Liberdade Econômica) — as partes podem LIVREMENTE pactuar regras de interpretação diversas das legais, sem distinção de forma.<br><br><b>⚠️ As outras:</b> enxertam restrições inexistentes (só móveis, só sem incapazes, só público, ou "não podem").<br><br><b>📌 Norma:</b> art. 113, §2º CC | QConcursos Q3775825`},

  {id:'q89', materia:'Teoria da imprevisão (STJ)', tipo:'multipla',
   enunciado:`De acordo com o STJ, aplica-se a teoria da imprevisão quando a onerosidade excessiva decorrer de:`,
   alternativas:[{letra:'A',texto:'Estiagem em contratos agrícolas'},{letra:'B',texto:'Pandemia, em relação à empresa de coworking, com drástica redução comprovada do faturamento'},{letra:'C',texto:'Contratos derivativos quando presentes os riscos e o desequilíbrio econômico-financeiro'},{letra:'D',texto:'Aumento salarial por dissídio coletivo (contrato administrativo)'},{letra:'E',texto:'Pragas em contratos agrícolas'}],
   correta:'B',
   comentario:`<b>⚖️ Por quê (B):</b> o STJ só aplica quando o fato é EXTRAORDINÁRIO e IMPREVISÍVEL. A pandemia, para coworking com queda comprovada, entra.<br><br><b>⚠️ As outras (áleas ordinárias):</b> estiagem/pragas no agronegócio, derivativos (câmbio) e dissídio coletivo são previsíveis.<br><br><b>⚖️ STJ:</b> agronegócio e câmbio = álea ordinária; pandemia = extraordinária.<br><br><b>📌 Norma:</b> art. 478 CC | QConcursos Q3775035`},

  {id:'q90', materia:'Evicção', tipo:'multipla',
   enunciado:`Segundo o STJ, o evicto tem direito à restituição integral do valor do bem, calculado ao tempo em que:`,
   alternativas:[{letra:'A',texto:'Realizado o negócio, valor de mercado à celebração'},{letra:'B',texto:'Dele foi desapossado, considerado o valor do bem apurado no momento da perda sofrida'},{letra:'C',texto:'Desapossado, mas valor do negócio celebrado'},{letra:'D',texto:'Desapossado, mas valor de mercado à celebração'},{letra:'E',texto:'Realizado o negócio, preço à época corrigido'}],
   correta:'B',
   comentario:`<b>⚖️ Por quê (B):</b> valor da coisa NA ÉPOCA EM QUE SE EVENCEU (desapossamento) — art. 450, §ún; o STJ confirma.<br><br><b>⚠️ B × C × D:</b> B = valor no momento da perda (correta); C/D usam valor do negócio/celebração.<br><br><b>📌 Norma:</b> art. 450, §ún CC | QConcursos Q3775033`},

  {id:'q91', materia:'Capacidade e emancipação', tipo:'multipla',
   enunciado:`Pedro, 15 anos, jogador profissional de futebol (salário R$ 100 mil). O contrato é assinado no dia seguinte ao seu 16º aniversário, sem assistência dos genitores. O negócio jurídico é:`,

// ── State ──────────────────────────────────────────────────────────────────
function defaultState() {
  return {
    respostas: {},
    revisao: {},
    caderno: {},
    revisarDepois: {},
    posicao: 0,
    modo: 'todas',
    materiaFiltro: '',
    notas: {}
  };
}

let state = defaultState();
let lista = [];
let paused = false;
let qSecs = 0, sSecs = 0;
let timerInterval = null;
let commentOpen = {};

// ── Persistence ────────────────────────────────────────────────────────────
function saveState() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch(e) {}
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      state = Object.assign(defaultState(), parsed);
    }
  } catch(e) { state = defaultState(); }
}

// ── Date helpers ───────────────────────────────────────────────────────────
function today() { return new Date().toISOString().split('T')[0]; }

function addDays(d, n) {
  const dt = new Date(d + 'T12:00:00');
  dt.setDate(dt.getDate() + n);
  return dt.toISOString().split('T')[0];
}

function fmtDate(iso) {
  if (!iso) return '';
  const [y, m, d] = iso.split('-');
  return d + '/' + m + '/' + y;
}

// ── Fisher-Yates shuffle ───────────────────────────────────────────────────
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

// ── Build list based on mode ───────────────────────────────────────────────
function buildLista() {
  const t = today();
  let ids;
  if (state.modo === 'todas') {
    ids = QUESTOES.map(function(q){ return q.id; });
  } else if (state.modo === 'hoje') {
    ids = QUESTOES.filter(function(q){
      const r = state.revisao[q.id];
      return r && r.nextDate && r.nextDate <= t;
    }).map(function(q){ return q.id; });
  } else if (state.modo === 'caderno') {
    ids = QUESTOES.filter(function(q){
      return state.caderno[q.id] || state.revisarDepois[q.id];
    }).map(function(q){ return q.id; });
  } else if (state.modo === 'materia') {
    const m = state.materiaFiltro;
    ids = QUESTOES.filter(function(q){ return !m || q.materia === m; }).map(function(q){ return q.id; });
  } else if (state.modo === 'aleatorio') {
    ids = shuffle(QUESTOES.map(function(q){ return q.id; }));
  } else {
    ids = QUESTOES.map(function(q){ return q.id; });
  }
  return ids;
}

// ── Stats ──────────────────────────────────────────────────────────────────
function computeStats() {
  const contaveis = QUESTOES.filter(function(q){ return !q.anulada; });
  const total = contaveis.length;
  let acertos = 0, erros = 0;
  const t = today();
  let revisadasHoje = 0;

  contaveis.forEach(function(q) {
    const r = state.respostas[q.id];
    if (r) {
      if (r === q.correta) acertos++;
      else erros++;
    }
    const rev = state.revisao[q.id];
    if (rev && rev.lastAnswered === t) revisadasHoje++;
  });

  const respondidas = acertos + erros;
  const pendentes = total - respondidas;
  const pct = total > 0 ? Math.round((respondidas / total) * 100) : 0;
  return { total: total, acertos: acertos, erros: erros, pendentes: pendentes,
           revisadasHoje: revisadasHoje, respondidas: respondidas, pct: pct };
}

function renderStats() {
  const s = computeStats();
  const bar = document.getElementById('statsBar');
  bar.innerHTML =
    '<div class="stat-chip"><span class="sv green">' + s.acertos + '</span><span class="sl">Acertos</span></div>' +
    '<div class="stat-chip"><span class="sv red">' + s.erros + '</span><span class="sl">Erros</span></div>' +
    '<div class="stat-chip"><span class="sv amber">' + s.pendentes + '</span><span class="sl">Pendentes</span></div>' +
    '<div class="stat-chip"><span class="sv cyan">' + s.revisadasHoje + '</span><span class="sl">Revisadas hoje</span></div>';

  const fill = document.getElementById('progressFill');
  const lbl = document.getElementById('progressLabel');
  if (fill) fill.style.width = s.pct + '%';
  if (lbl) lbl.textContent = s.respondidas + '/' + s.total + ' respondidas (' + s.pct + '%) — anulada Q82 não contada';
}

// ── Timers ─────────────────────────────────────────────────────────────────
function fmtTime(secs) {
  const m = String(Math.floor(secs / 60)).padStart(2, '0');
  const s = String(secs % 60).padStart(2, '0');
  return m + ':' + s;
}

function startTimers() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(function() {
    if (!paused) {
      qSecs++;
      sSecs++;
    }
    const qEl = document.getElementById('timerQ');
    const sEl = document.getElementById('timerS');
    if (qEl) qEl.textContent = fmtTime(qSecs);
    if (sEl) sEl.textContent = fmtTime(sSecs);
  }, 1000);
}

function resetQTimer() {
  qSecs = 0;
  const qEl = document.getElementById('timerQ');
  if (qEl) qEl.textContent = '00:00';
}

function togglePause() {
  paused = !paused;
  const btn = document.getElementById('btnPause');
  if (btn) btn.textContent = paused ? 'Retomar' : 'Pausar';
}

// ── Spaced repetition ──────────────────────────────────────────────────────
function scheduleNext(id, acertou) {
  const t = today();
  const rv = state.revisao[id] || { nextDate: null, interval: 1, acertos: 0, lastAnswered: null };
  rv.lastAnswered = t;
  if (acertou) {
    rv.acertos = (rv.acertos || 0) + 1;
    if (rv.acertos === 1) rv.interval = 1;
    else if (rv.acertos === 2) rv.interval = 7;
    else rv.interval = 30;
  } else {
    rv.acertos = 0;
    rv.interval = 1;
  }
  rv.nextDate = addDays(t, rv.interval);
  state.revisao[id] = rv;
}

function scheduleManual(id, days) {
  const t = today();
  const rv = state.revisao[id] || { nextDate: null, interval: days, acertos: 0, lastAnswered: t };
  rv.nextDate = (days === 0) ? null : addDays(t, days);
  rv.interval = days;
  state.revisao[id] = rv;
  saveState();
  renderCard();
}

// ── Render helpers ─────────────────────────────────────────────────────────
function reviewBadgeHTML(id) {
  const rv = state.revisao[id];
  if (!rv || !rv.nextDate) return '';
  const t = today();
  if (rv.nextDate <= t) {
    return '<span class="review-badge review-today">revisar hoje ⏰</span>';
  }
  return '<span class="review-badge review-future">📅 ' + fmtDate(rv.nextDate) + '</span>';
}

function schedRowHTML(id) {
  return '<div class="sched-row">' +
    '<span class="sched-label">Agendar:</span>' +
    '<button class="sched-btn" onclick="scheduleManual(\'' + id + '\',1)">1 dia</button>' +
    '<button class="sched-btn" onclick="scheduleManual(\'' + id + '\',7)">7 dias</button>' +
    '<button class="sched-btn" onclick="scheduleManual(\'' + id + '\',30)">30 dias</button>' +
    '<button class="sched-btn remove" onclick="scheduleManual(\'' + id + '\',0)">remover</button>' +
    '</div>';
}

function starBtnHTML(id) {
  const active = state.revisarDepois[id] ? ' active' : '';
  const label = state.revisarDepois[id] ? '⭐ No caderno' : '☆ Revisar depois';
  return '<button class="star-btn' + active + '" onclick="toggleStar(\'' + id + '\')">' + label + '</button>';
}

// ── Toggle star ────────────────────────────────────────────────────────────
function toggleStar(id) {
  if (state.revisarDepois[id]) delete state.revisarDepois[id];
  else state.revisarDepois[id] = true;
  saveState();
  syncResultado();
  renderCard();
  renderStats();
}

// ── Answer selection ───────────────────────────────────────────────────────
function selecionarAlternativa(id, letra) {
  if (state.respostas[id]) return;
  document.querySelectorAll('.alt-btn[data-id="' + id + '"]').forEach(function(btn) {
    btn.classList.remove('selected');
  });
  const btn = document.querySelector('.alt-btn[data-id="' + id + '"][data-letra="' + letra + '"]');
  if (btn) btn.classList.add('selected');
  const confirmBtn = document.getElementById('confirm-' + id);
  if (confirmBtn) confirmBtn.disabled = false;
}

// ── Confirm ────────────────────────────────────────────────────────────────
function confirmar(id) {
  const q = QUESTOES.find(function(x){ return x.id === id; });
  if (!q) return;

  if (q.anulada) {
    state.respostas[id] = 'ANULADA';
  } else {
    const selected = document.querySelector('.alt-btn[data-id="' + id + '"].selected');
    if (!selected) return;
    const letraEscolhida = selected.dataset.letra;
    state.respostas[id] = letraEscolhida;
    const acertou = letraEscolhida === q.correta;
    scheduleNext(id, acertou);
    if (!acertou) state.caderno[id] = true;
  }

  saveState();
  renderCard();
  renderStats();
}

// ── Comment toggle ─────────────────────────────────────────────────────────
function toggleComment(id) {
  commentOpen[id] = !commentOpen[id];
  const body = document.getElementById('comment-body-' + id);
  const tog = document.getElementById('comment-toggle-' + id);
  if (body) body.classList.toggle('open', !!commentOpen[id]);
  if (tog) tog.textContent = commentOpen[id] ? '▲ Ocultar comentário' : '▼ Ver comentário / gabarito';
}

// ── Main render ────────────────────────────────────────────────────────────
function salvarNota(id, txt){
  if(!state.notas) state.notas = {};
  state.notas[id] = txt;
  saveState();
}

function renderCard() {
  const cont = document.getElementById('mainContent');
  if (!lista.length) {
    cont.innerHTML = '<div class="empty-state"><div class="icon">📭</div><div>Nenhuma questão neste filtro.</div></div>';
    return;
  }

  const pos = Math.min(Math.max(state.posicao, 0), lista.length - 1);
  state.posicao = pos;
  const id = lista[pos];
  const q = QUESTOES.find(function(x){ return x.id === id; });
  if (!q) { cont.innerHTML = ''; return; }

  const resposta = state.respostas[id];
  const respondida = !!resposta;
  const isAnulada = !!q.anulada;
  const acertou = respondida && !isAnulada && resposta === q.correta;
  const errou = respondida && !isAnulada && resposta !== q.correta;

  // Result banner
  let resultHTML = '';
  if (respondida) {
    if (isAnulada) {
      resultHTML = '<div class="result-banner anulada">⚠️ Esta questão foi ANULADA pela banca. Nenhuma resposta é considerada errada.</div>';
    } else if (acertou) {
      resultHTML = '<div class="result-banner correct">✅ Correto! Resposta: ' + resposta + '</div>';
    } else {
      resultHTML = '<div class="result-banner wrong">❌ Incorreto. Sua resposta: ' + resposta + ' | Gabarito: ' + q.correta + '</div>';
    }
  }

  // Alternativas
  let altsHTML = '<div class="alts">';
  q.alternativas.forEach(function(alt) {
    let btnCls = 'alt-btn';
    let letraCls = 'alt-letra';
    const disabled = respondida ? 'disabled' : '';

    if (respondida && !isAnulada) {
      if (alt.letra === q.correta && alt.letra === resposta) {
        btnCls = 'alt-btn correct';
        letraCls = 'alt-letra correct';
      } else if (alt.letra === q.correta) {
        btnCls = 'alt-btn reveal-correct';
        letraCls = 'alt-letra reveal-correct';
      } else if (alt.letra === resposta) {
        btnCls = 'alt-btn wrong';
        letraCls = 'alt-letra wrong';
      }
    }

    altsHTML += '<button class="' + btnCls + '" data-id="' + id + '" data-letra="' + alt.letra + '" ' + disabled +
      ' onclick="selecionarAlternativa(\'' + id + '\',\'' + alt.letra + '\')">' +
      '<span class="' + letraCls + '">' + alt.letra + '</span>' +
      '<span>' + alt.texto + '</span>' +
      '</button>';
  });
  altsHTML += '</div>';

  // Confirm button
  let confirmHTML = '';
  if (!respondida) {
    if (isAnulada) {
      confirmHTML = '<button class="btn-confirm" id="confirm-' + id + '" onclick="confirmar(\'' + id + '\')">Marcar como vista (questão anulada)</button>';
    } else {
      confirmHTML = '<button class="btn-confirm" id="confirm-' + id + '" onclick="confirmar(\'' + id + '\')" disabled>Confirmar</button>';
    }
  }

  // Comment
  const cOpen = commentOpen[id] ? ' open' : '';
  const cLabel = commentOpen[id] ? '▲ Ocultar comentário' : '▼ Ver comentário / gabarito';
  const commentHTML = respondida ?
    '<div class="comment-wrap">' +
    '<button class="comment-toggle" id="comment-toggle-' + id + '" onclick="toggleComment(\'' + id + '\')">' + cLabel + '</button>' +
    '<div class="comment-body' + cOpen + '" id="comment-body-' + id + '">' + q.comentario + '</div>' +
    '</div>' : '';

  // Scheduling
  const schedHTML = respondida ? schedRowHTML(id) : '';

  // Review badge + anulada badge
  const rvBadge = reviewBadgeHTML(id);
  const anuladaBadge = isAnulada ? '<span class="badge badge-anulada">ANULADA</span>' : '';

  var notaVal = (state.notas && state.notas[id]) ? state.notas[id] : '';
  var notasHTML = '<div class="notas-wrap"><div class="notas-label">📝 Minhas anotações</div><textarea class="notas-area" placeholder="Escreva aqui suas anotações sobre esta questão…" oninput="salvarNota(\'' + id + '\', this.value)">' + notaVal.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</textarea></div>';
  cont.innerHTML =
    '<div class="nav-counter">Questão ' + (pos + 1) + ' de ' + lista.length + '</div>' +
    '<div class="card">' +
    '<div class="card-meta">' +
    '<span class="badge badge-id">' + q.id.toUpperCase() + '</span>' +
    '<span class="badge badge-materia">' + q.materia + '</span>' +
    anuladaBadge + rvBadge + starBtnHTML(id) +
    '</div>' +
    '<div class="enunciado">' + q.enunciado + '</div>' +
    altsHTML +
    confirmHTML +
    resultHTML +
    commentHTML +
    schedHTML +
    notasHTML +
    '</div>' +
    '<div class="nav-row">' +
    '<button class="nav-btn" onclick="navPrev()" ' + (pos === 0 ? 'disabled' : '') + '>← Anterior</button>' +
    '<button class="nav-btn" onclick="navNext()" ' + (pos >= lista.length - 1 ? 'disabled' : '') + '>Próxima →</button>' +
    '</div>';
}

// ── Navigation ─────────────────────────────────────────────────────────────
function navPrev() {
  if (state.posicao > 0) {
    state.posicao--;
    saveState();
    resetQTimer();
    renderCard();
  }
}

function navNext() {
  if (state.posicao < lista.length - 1) {
    state.posicao++;
    saveState();
    resetQTimer();
    renderCard();
  }
}

// ── Mode / filter ──────────────────────────────────────────────────────────
function setModo(modo) {
  state.modo = modo;
  state.posicao = 0;
  const sel = document.getElementById('materiaSelect');
  if (sel) sel.style.display = (modo === 'materia') ? '' : 'none';
  document.querySelectorAll('.mode-btn').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.modo === modo);
  });
  lista = buildLista();
  saveState();
  resetQTimer();
  renderCard();
  renderStats();
}

function setMateriaFiltro(val) {
  state.materiaFiltro = val;
  state.posicao = 0;
  lista = buildLista();
  saveState();
  resetQTimer();
  renderCard();
}

function populateMateriaSelect() {
  const materias = [];
  QUESTOES.forEach(function(q) {
    if (materias.indexOf(q.materia) === -1) materias.push(q.materia);
  });
  materias.sort();
  const sel = document.getElementById('materiaSelect');
  if (!sel) return;
  sel.innerHTML = '<option value="">— Escolha —</option>';
  materias.forEach(function(m) {
    const opt = document.createElement('option');
    opt.value = m;
    opt.textContent = m;
    if (m === state.materiaFiltro) opt.selected = true;
    sel.appendChild(opt);
  });
}

// ── Recomeçar ──────────────────────────────────────────────────────────────
function recomecar() {
  if (confirm('Tem certeza? Todo o progresso (respostas, agendamentos, caderno) será apagado permanentemente.')) {
    localStorage.removeItem(STORE_KEY);
    location.reload();
  }
}

// ── Export / Import ────────────────────────────────────────────────────────
function exportarProgresso() {
  const json = JSON.stringify(state, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'progresso_q84_q98_' + today() + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function exportarNotas(){
  var txt = 'ANOTAÇÕES — Civil Q84–Q98\n' + today() + '\n\n';
  var n = 0;
  QUESTOES.forEach(function(q){
    var nota = state.notas && state.notas[q.id];
    if(nota && nota.trim()){
      n++;
      txt += '【' + q.id.toUpperCase() + ' · ' + q.materia + '】\n' + nota.trim() + '\n\n';
    }
  });
  if(!n){ alert('Você ainda não tem anotações registradas.'); return; }
  var blob = new Blob([txt], {type:'text/plain;charset=utf-8'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'anotacoes_q84_q98_' + today() + '.txt';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importarProgresso(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const parsed = JSON.parse(e.target.result);
      state = Object.assign(defaultState(), parsed);
      saveState();
      lista = buildLista();
      populateMateriaSelect();
      document.querySelectorAll('.mode-btn').forEach(function(btn) {
        btn.classList.toggle('active', btn.dataset.modo === state.modo);
      });
      const sel = document.getElementById('materiaSelect');
      if (sel) sel.style.display = (state.modo === 'materia') ? '' : 'none';
      renderStats();
      renderCard();
      alert('Progresso importado com sucesso!');
    } catch(err) {
      alert('Arquivo inválido ou corrompido.');
    }
  };
  reader.readAsText(file);
  evt.target.value = '';
}

// ── Iframe banner ──────────────────────────────────────────────────────────
function dismissIframeBanner() {
  const b = document.getElementById('bannerIframe');
  if (b) b.style.display = 'none';
  try { sessionStorage.setItem('iframe_banner_dismissed', '1'); } catch(e) {}
}

function checkIframeBanner() {
  try {
    if (sessionStorage.getItem('iframe_banner_dismissed') === '1') {
      const b = document.getElementById('bannerIframe');
      if (b) b.style.display = 'none';
    }
  } catch(e) {}
}

// ── Init ───────────────────────────────────────────────────────────────────
function init() {
  loadState();
  checkIframeBanner();
  populateMateriaSelect();

  document.querySelectorAll('.mode-btn').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.modo === state.modo);
  });

  const sel = document.getElementById('materiaSelect');
  if (sel && state.modo === 'materia') sel.style.display = '';

  lista = buildLista();
  renderStats();
  renderCard();
  startTimers();
}

init();

window.addEventListener("load",function(){try{syncResultado();}catch(e){}});/*sync-on-load*/
</script>
</body>
</html>
