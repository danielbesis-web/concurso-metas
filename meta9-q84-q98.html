 explicacao:"O valor a restituir ao evicto é o da coisa na época em que se evenceu (momento do desapossamento), não o do contrato (art. 450, parágrafo único). O STJ confirma. As alternativas C e D usam 'valor do negócio' ou 'tempo da celebração'; A e E ancoram no tempo do negócio.",
 pegadinha:"Usar o 'valor do contrato' ou 'tempo da celebração' — o correto é o valor atual da coisa, ao tempo da evicção.",
 mnemonico:"Evicção: vale o preço da coisa NA HORA da perda (art. 450, § ún).",
 verif:{qc:"Q3775033",dd:"STJ — valor da coisa ao tempo da evicção",norma:"art. 450 § ún CC"}},
{n:91,id:"Q3673867",meta:"FGV · ENAC · 2025",tema:"Emancipação legal (art. 5º, § ún, V)",comando:"assinalar a correta",answer:"B",
 enun:"Pedro, 15 anos, jogador profissional de futebol (salário R$ 100 mil). O contrato é assinado no dia seguinte ao seu 16º aniversário, sem assistência dos genitores. O negócio jurídico é:",items:[],prompt:"",
 opts:[["A","válido — a participação do pai nas tratativas supre a assistência"],["B","existente, válido e eficaz, porque emancipado ao completar 16 anos por possuir economias próprias"],["C","inválido — só emanciparia com autorização judicial e registro"],["D","inválido — só com registro público"],["E","inválido — só com autorização judicial"]],
 fundamento:"art. 5º, parágrafo único, V do CC.",
 explicacao:"Pedro, atleta profissional com economia própria, foi emancipado de pleno direito ao completar 16 anos (art. 5º, parágrafo único, V). A emancipação legal é automática — não depende de autorização judicial nem de registro como condição de validade. As demais exigem requisitos da emancipação voluntária (pais por instrumento público mais registro).",
 pegadinha:"Confundir emancipação legal (automática) com a voluntária (instrumento público mais registro) ou judicial (sentença).",
 mnemonico:"Emprego com economia própria aos 16 = emancipação LEGAL automática.",
 verif:{qc:"Q3673867",dd:"N/A — letra de norma",norma:"art. 5º § ún V CC"}},
{n:92,id:"Q3151530",meta:"Cespe · TJ-PE · 2024 · Remoção",tema:"Herança de pessoa viva (art. 426)",comando:"assinalar a correta",answer:"D",
 enun:"Após reconhecer a paternidade, o pai propôs ao filho indenização se ele aceitasse ser excluído da herança (renúncia antecipada ao quinhão na sucessão futura). Houve homologação judicial. Segundo o STJ, a transação é:",items:[],prompt:"",
 opts:[["A","válida — a homologação impede o reconhecimento do vício"],["B","ineficaz"],["C","válida — direito disponível"],["D","nula, pois herança de pessoa viva não pode ser objeto de contrato"],["E","anulável"]],
 fundamento:"arts. 426 e 166 do CC + STJ.",
 explicacao:"Renúncia antecipada a quinhão de sucessão ainda não aberta é pacto sobre herança de pessoa viva (pacta corvina), vedado pelo art. 426, gerando nulidade absoluta (art. 166). O STJ confirma que a homologação judicial não convalida a nulidade. 'Ineficaz' (B) e 'anulável' (E) erram a categoria; A e C dizem 'válida'.",
 pegadinha:"A homologação judicial não sana a nulidade; e a categoria é NULIDADE, não ineficácia nem anulabilidade.",
 mnemonico:"Herança de pessoa viva = NULO (art. 426); homologação não salva.",
 verif:{qc:"Q3151530",dd:"STJ — pacta corvina é nulo; homologação não convalida",norma:"arts. 426, 166 CC"}},
{n:93,id:"Q2553219",meta:"Vunesp · TJ-SP · 2024 · Ingresso",tema:"Boa-fé objetiva — supressio",comando:"assinalar a correta",answer:"C",
 enun:"Alfa presta serviços a Beta (2015) com reajuste anual; prazo de 48 meses, depois prosseguiram sem aditamento. Reajustes aplicados até 2020, depois não cobrados. Em 2024 Beta sai; Alfa cobra multa rescisória e reajuste retroativo a 2021. É correto afirmar que a cobrança:",items:[],prompt:"",
 opts:[["A","da multa é lícita (expectativa de manutenção)"],["B","do reajuste retroativo é lícita (mera liberalidade)"],["C","do reajuste retroativo é ilícita, pois viola a vedação de comportamento contraditório (boa-fé objetiva)"],["D","da multa é lícita, embora excessivo o montante"]],
 fundamento:"art. 422 do CC (boa-fé objetiva — supressio / venire contra factum proprium).",
 explicacao:"Alfa tolerou o reajuste a menor por anos, criando expectativa na contraparte. Cobrar a diferença retroativa agora é comportamento contraditório (venire contra factum proprium) e configura supressio — perda do direito pelo não-exercício prolongado, derivada da boa-fé objetiva (art. 422). A multa também não incide, pois o termo expirou e o contrato passou a vigorar por prazo indeterminado.",
 pegadinha:"A multa 'parece' devida pela continuidade, mas o termo já expirara; e o reajuste retroativo esbarra na supressio.",
 mnemonico:"Não exercer por muito tempo + criar expectativa = supressio (perde o direito).",
 verif:{qc:"Q2553219",dd:"supressio / venire contra factum proprium",norma:"art. 422 CC"}},
{n:94,id:"Q2307542",meta:"FGV · TJ-SE · 2023 · Remoção",tema:"Contrato preliminar — falta de registro (art. 463, § ún)",comando:"assinalar a correta",answer:"D",
 enun:"Adriana e Bernardo celebraram contrato preliminar para venda de participação societária, sem levar ao registro competente (art. 463, § ún). Ante a falta de registro, o negócio deve ser reputado:",items:[],prompt:"",
 opts:[["A","inexistente"],["B","nulo (requisito de validade)"],["C","anulável"],["D","relativamente ineficaz, pois o registro destina-se à oponibilidade perante terceiros"],["E","absolutamente ineficaz"]],
 fundamento:"art. 463, parágrafo único do CC + Enunciado 30 do CJF.",
 explicacao:"O registro do contrato preliminar (art. 463, parágrafo único) é fator de eficácia perante terceiros, não requisito de validade nem de existência. Sem registro, o contrato vale e obriga entre as partes, mas é relativamente ineficaz quanto a terceiros (Enunciado 30 do CJF). As demais o tratam como inexistente, nulo, anulável ou absolutamente ineficaz.",
 pegadinha:"Tratar o registro como requisito de validade ou existência — é apenas fator de eficácia e oponibilidade a terceiros.",
 mnemonico:"Registro do preliminar = oponibilidade a terceiros, não validade.",
 verif:{qc:"Q2307542",dd:"Enunciado 30 CJF — eficácia perante terceiros",norma:"art. 463 § ún CC"}},
{n:95,id:"Q2306770",meta:"FGV · TJ-SE · 2023 · Ingresso",tema:"Distrato e forma (arts. 472 + 108)",comando:"assinalar a correta",answer:"E",
 enun:"André vendeu imóvel a Bianca por instrumento público, embora o valor fosse inferior a 30 vezes o salário mínimo. Desistiram em comum acordo e celebraram o distrato por instrumento particular. O distrato é:",items:[],prompt:"",
 opts:[["A","inexistente"],["B","nulo"],["C","anulável"],["D","ineficaz"],["E","válido"]],
 fundamento:"arts. 472 e 108 do CC.",
 explicacao:"O art. 472 manda o distrato seguir a forma exigida por lei. Para imóvel de valor inferior a 30 vezes o salário mínimo, a escritura pública não é exigida (art. 108) — foi adotada por opção. Logo, o distrato por instrumento particular é válido. As demais supõem forma pública obrigatória, que não havia.",
 pegadinha:"A forma do distrato segue a EXIGIDA por lei, não a efetivamente ADOTADA.",
 mnemonico:"Distrato = forma exigida (art. 472); escritura só p/ imóvel > 30x SM (art. 108).",
 verif:{qc:"Q2306770",dd:"N/A — letra de norma",norma:"arts. 472, 108 CC"}},
{n:96,id:"Q2512277",meta:"Consulplan · TJ-MA · 2023 · Remoção",tema:"Evicção (art. 449)",comando:"assinalar a correta",answer:"C",
 enun:"Pedro comprou de João, na forma da lei, uma casa em São Luís/MA por R$ 600 mil. É acionado por Felipe, que diz ser o real proprietário do imóvel, usurpado por João. É correto afirmar que:",items:[],prompt:"",
 opts:[["A","para exercer os direitos da evicção, é necessário o trânsito em julgado"],["B","evicção é perda por decisão judicial, inviável em apreensão administrativa"],["C","com cláusula de irresponsabilidade pela evicção, se ela ocorrer e o evicto não sabia do risco, o alienante responde pelo preço"],["D","é lícito reforçar a responsabilidade, mas a parte só responderá até o valor da coisa"]],
 fundamento:"arts. 448 e 449 do CC + STJ.",
 explicacao:"Pelo art. 449, mesmo com cláusula que exclui a garantia da evicção, se o evicto não sabia do risco, ele recebe o preço que pagou. As alternativas A e B prendem a evicção a sentença transitada em julgado ou negam a apreensão administrativa (o STJ admite ambos); a D 'limita ao valor da coisa', mas reforçar (art. 448) agrava a responsabilidade.",
 pegadinha:"Cláusula de exclusão não retira o direito ao preço de quem ignorava o risco; e a evicção independe de sentença transitada.",
 mnemonico:"Excluiu a garantia? Quem não sabia do risco ainda recebe o PREÇO (art. 449).",
 verif:{qc:"Q2512277",dd:"STJ — evicção independe de sentença / cabe em apreensão administrativa",norma:"arts. 448, 449 CC"}},
{n:97,id:"Q2512274",meta:"Consulplan · TJ-MA · 2023 · Remoção",tema:"Inadimplemento antecipado + safra futura",comando:"assinalar a correta",answer:"D",
 enun:"Pedro Paulo (comerciante de cereais) tem contratos de safra futura; procurou Marcolino para adquirir sua safra futura (milho). À luz da Teoria Geral dos Contratos:",items:[],prompt:"",
 opts:[["A","é válida a cláusula que deixa exclusivamente a Pedro Paulo fixar o preço da safra"],["B","por ser obrigação personalíssima, a morte de Pedro Paulo extingue o contrato"],["C","chuvas, pragas e oscilações de preço são fato extraordinário e imprevisível que autoriza a resolução"],["D","evidenciado antes do prazo que Marcolino não cumprirá, Pedro Paulo pode pedir a extinção do pacto com devolução do antecipado — inadimplemento antecipado"]],
 fundamento:"art. 489 do CC + teoria do inadimplemento antecipado (STJ).",
 explicacao:"Inadimplemento antecipado (quebra antecipada): evidenciado antes do termo que o devedor não cumprirá, o credor pode pedir a extinção desde logo, com devolução do antecipado. A 'a' é nula (preço ao arbítrio exclusivo de uma parte, art. 489); 'b' erra (safra futura não é personalíssima); 'c' erra (riscos do agronegócio são álea ordinária, STJ).",
 pegadinha:"A alternativa C 'parece' imprevisão, mas chuva, praga e preço no agronegócio são previsíveis (álea ordinária).",
 mnemonico:"Vai descumprir antes do prazo? Pode resolver já = inadimplemento antecipado.",
 verif:{qc:"Q2512274",dd:"inadimplemento antecipado; agronegócio = álea ordinária (STJ)",norma:"art. 489 CC"}},
{n:98,id:"Q2513647",meta:"Consulplan · TJ-AC · 2023 · Remoção",tema:"Evicção — extensão da indenização (art. 450)",comando:"assinalar a correta",answer:"D",
 enun:"Em relação à evicção, assinale a afirmativa correta.",items:[],prompt:"",
 opts:[["A","todos os contratos podem ter cláusula que diminui/exclui a responsabilidade do alienante por evicção"],["B","ainda que soubesse que o bem era litigioso, terá sempre o direito de demandar o alienante"],["C","com cláusula genérica de exclusão, o adquirente não terá meios de reclamar qualquer indenização"],["D","o adquirente que perdeu em leilão a casa que alugava terá direito ao valor atual do imóvel mais lucros cessantes (aluguel) e multas/indenizações pagas ao inquilino"]],
 fundamento:"arts. 447, 449, 450 e 457 do CC.",
 explicacao:"Pelo art. 450, além do valor da coisa (ao tempo da evicção), o evicto recobra perdas e danos — inclusive lucros cessantes (aluguel que deixou de receber) e indenizações pagas ao inquilino. A 'a' erra ('todos os contratos' — a garantia é dos onerosos, art. 447); 'b' erra (art. 457 — não cabe a quem sabia ser litigioso); 'c' erra (cláusula genérica não exonera; art. 449).",
 pegadinha:"'Todos os contratos' (x onerosos); 'sempre' (x art. 457); 'qualquer indenização' (x art. 449).",
 mnemonico:"Evicto recebe valor da coisa + perdas e danos (lucros cessantes incluídos).",
 verif:{qc:"Q2513647",dd:"N/A — letra de norma",norma:"arts. 447, 449, 450, 457 CC"}}
];

function hl(s){
  if(!s) return '';
  s=s.replace(/(arts?\.\s?\d+[ºo]?(?:\s?a\s?\d+[ºo]?)?(?:\s?,?\s?§\s?\d+[ºo]?)?(?:\s?,?\s?[IVX]+\b)?)/gi,'<span class="hl-art">$1</span>');
  s=s.replace(/\b(supressio|surrectio|venire contra factum proprium|pacta corvina|eventus damni|consilium fraudis|res perit domino|actio nata|bystander)\b/gi,'<span class="hl-con">$1</span>');
  s=s.replace(/\b(sempre|somente|nunca|exceto|apenas|jamais|todos|incorreta|correta)\b/gi,'<span class="hl-key">$1</span>');
  return s;
}

const STORE='concurso_q84_q98_v2', REV='concurso_q84_q98_v2_rev';
let state=JSON.parse(localStorage.getItem(STORE)||'{}');
let reviews=JSON.parse(localStorage.getItem(REV)||'{}');
if(!state.resp) state.resp={}; if(typeof state.pos!=='number') state.pos=0;
let pos=state.pos||0, secQ=0, secS=state.tempo||0, pausado=false, tick=null;
function save(){state.pos=pos;state.tempo=secS;try{localStorage.setItem(STORE,JSON.stringify(state));}catch(e){}}
function saveRev(){try{localStorage.setItem(REV,JSON.stringify(reviews));}catch(e){}}
function hojeISO(){const d=new Date();d.setHours(0,0,0,0);return d.toISOString().slice(0,10);}
function maisDias(n){const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function fmt(s){const m=Math.floor(s/60),x=s%60;return String(m).padStart(2,'0')+':'+String(x).padStart(2,'0');}

function render(){
  if(pos<0)pos=0; if(pos>=QS.length)pos=QS.length-1;
  const q=QS[pos]; secQ=0; document.getElementById('tQ').textContent='00:00';
  const resp=state.resp[q.n], done=!!resp;
  const items=q.items&&q.items.length?`<div class="items">${q.items.map(it=>`<div class="item">${hl(it)}</div>`).join('')}</div>`:'';
  const prompt=q.prompt?`<div class="prompt">${hl(q.prompt)}</div>`:'';
  const alts=q.opts.map(([L,txt])=>{
    let cls='alt';
    if(done){ if(L===q.answer)cls+=' correct'; if(resp===L&&L!==q.answer)cls+=' wrong'; if(resp===L)cls+=' sel'; }
    return `<button class="${cls}" data-l="${L}" onclick="responder('${L}')"><span class="lt">${L}</span><span class="at">${hl(txt)}</span></button>`;
  }).join('');
  document.getElementById('qarea').innerHTML=`
    <div class="qmeta">Q${q.n} · <b>${q.meta}</b> — ${q.tema}</div>
    <div class="enuncard"><div class="qlabel">QUESTÃO</div><div class="enun">${hl(q.enun)}</div>${items}${prompt}</div>
    <div class="alts${done?' done':''}">${alts}</div>`;
  document.getElementById('btPrev').disabled=pos===0;
  document.getElementById('btNext').disabled=pos===QS.length-1;
  document.getElementById('pBar').style.width=((pos+1)/QS.length*100)+'%';
  document.getElementById('pPos').textContent=(pos+1)+' / '+QS.length;
  updateScore();
  renderGab(done);
  save();
}
function renderGab(done){
  const q=QS[pos], g=document.getElementById('garea');
  if(!done){ g.innerHTML=`<div class="locked"><div class="ic">🔒</div><div>Selecione uma alternativa para revelar o gabarito comentado.</div></div>`; return; }
  const rev=reviews[q.n], hoje=hojeISO();
  const dias=[1,3,7,15,30];
  const revbtns=dias.map(d=>{
    const iso=maisDias(d); const on=rev===iso?' on':'';
    return `<button class="rb${on}" onclick="agendar('${q.n}',${d})">${d} dia${d>1?'s':''}</button>`;
  }).join('');
  const revstat = rev ? (rev<=hoje?'⏰ revisar hoje':('agendada para '+rev.split('-').reverse().join('/'))) : '';
  g.innerHTML=`
    <div class="sec s-gab"><div class="sh"><span class="ic">✅</span>Gabarito oficial</div>
      <div class="gline"><div class="gbig">${q.answer}</div><div class="gsub">oficial confirmado<br><b>QConcursos ${q.id}</b> · ${q.comando}</div></div></div>
    <div class="sec s-fun"><div class="sh"><span class="ic">⚖️</span>Fundamento legal</div><p>${hl(q.fundamento)}</p></div>
    <div class="sec s-exp"><div class="sh"><span class="ic">📘</span>Explicação</div><p>${hl(q.explicacao)}</p></div>
    ${q.pegadinha?`<div class="sec s-peg"><div class="sh"><span class="ic">⚠️</span>Pegadinha da banca</div><p>${hl(q.pegadinha)}</p></div>`:''}
    ${q.mnemonico?`<div class="sec s-mne"><div class="sh"><span class="ic">🧠</span>Mnemônico</div><p>${hl(q.mnemonico)}</p></div>`:''}
    <div class="sec s-rev"><div class="sh"><span class="ic">🔁</span>Revisão espaçada</div>
      <div class="revbtns">${revbtns}</div><span class="revstat">${revstat}</span></div>
    <div class="sec s-ver"><div class="sh"><span class="ic">🔍</span>Verificação</div>
      <div class="vrow"><span class="vk">QConcursos</span><span class="vv">${q.verif.qc}</span><span class="vchk">✓</span></div>
      <div class="vrow"><span class="vk">Dizer o Direito</span><span class="vv">${q.verif.dd}</span></div>
      <div class="vrow"><span class="vk">Norma</span><span class="vv">${hl(q.verif.norma)}</span><span class="vchk">✓</span></div></div>`;
}
function responder(L){
  const q=QS[pos];
  if(state.resp[q.n]) return;
  state.resp[q.n]=L; save(); render();
}
function agendar(n,d){ reviews[n]=maisDias(d); saveRev(); renderGab(true); }
function nav(d){ const np=pos+d; if(np<0||np>=QS.length)return; pos=np; render(); window.scrollTo({top:0,behavior:'smooth'}); }
function updateScore(){
  let ac=0,er=0; QS.forEach(q=>{const r=state.resp[q.n]; if(r){r===q.answer?ac++:er++;}});
  document.getElementById('pScore').textContent='✓ '+ac+' · ✗ '+er;
}
function startTimer(){ if(tick)clearInterval(tick); tick=setInterval(()=>{ if(pausado)return; secQ++;secS++; document.getElementById('tQ').textContent=fmt(secQ); document.getElementById('tS').textContent=fmt(secS); if(secS%10===0)save(); },1000); }
function togglePause(){ pausado=!pausado; document.getElementById('btP').textContent=pausado?'▶':'⏸'; }
function resetAll(){ if(!confirm('Apagar todo o progresso (respostas e revisões) deste aparelho?'))return; state={resp:{},pos:0,tempo:0}; reviews={}; pos=0; secS=0; save(); saveRev(); document.getElementById('tS').textContent='00:00'; render(); }
document.getElementById('tS').textContent=fmt(secS);
render(); startTimer();
</script>
