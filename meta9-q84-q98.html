<script>
const STORE_KEY = 'concurso_q84_q98_v2';

const QUESTOES = [
  {id:'q84', materia:'Obrigações alternativas', tipo:'multipla',
   enunciado:`Sobre as obrigações alternativas, analise as assertivas.<br><br>
   <b>I.</b> A escolha cabe ao credor como regra, salvo estipulação contrária.<br>
   <b>II.</b> Nas obrigações divisíveis, o devedor pode obrigar o credor a receber parte em uma prestação e parte em outra, como regra.<br>
   <b>III.</b> Quando a obrigação for de prestações periódicas, a faculdade de opção poderá ser exercida em cada período.<br><br>
   <b>Assinale a correta:</b>`,
   alternativas:[{letra:'A',texto:'I e II'},{letra:'B',texto:'I, II e III'},{letra:'C',texto:'II e III'},{letra:'D',texto:'Apenas a assertiva III está correta'}],
   correta:'D',
   comentario:`<b>⚖️ Por quê (D):</b> Só a III está correta (art. 252, §2º): nas prestações periódicas, a opção é exercida em cada período. A I está errada — a escolha cabe ao <b>DEVEDOR</b> (art. 252, caput), não ao credor. A II está errada — art. 252, §1º: o devedor não pode obrigar o credor a receber parte em uma prestação e parte em outra.<br><br>
   <b>⚠️ Pegadinha:</b> I e II invertem o caput e o §1º do art. 252 — trocam o titular da escolha e "permitem" o pagamento fracionado, que é vedado.<br><br>
   <b>🧠 Mnemônico:</b> A escolha é do DEVEDOR; obrigação periódica → opção a cada período.<br><br>
   <b>📌 Norma:</b> art. 252 CC | QConcursos Q2272720`},

  {id:'q85', materia:'Contratos em geral', tipo:'multipla',
   enunciado:`Considerando o art. 422 e seguintes do CC, marque a alternativa <b>incorreta</b>:`,
   alternativas:[
    {letra:'A',texto:'Não pode ser objeto de contrato a herança de pessoa viva.'},
    {letra:'B',texto:'É lícito estipular contratos atípicos, observadas as normas gerais.'},
    {letra:'C',texto:'Nos contratos de adesão, são nulas as cláusulas de renúncia antecipada do aderente a direito resultante da natureza do negócio.'},
    {letra:'D',texto:'Os contratantes são obrigados a respeitar, na conclusão do contrato, todas as cláusulas do contrato.'},
    {letra:'E',texto:'Havendo cláusulas ambíguas ou contraditórias no contrato de adesão, adota-se a interpretação mais favorável ao aderente.'}
   ],
   correta:'D',
   comentario:`<b>⚖️ Por quê (D é a incorreta):</b> Distorce o art. 422 — os contratantes devem guardar os princípios de probidade e boa-fé, não "respeitar todas as cláusulas". As demais são letra da lei: art. 426 (herança de pessoa viva), art. 425 (contratos atípicos), art. 424 (renúncia antecipada nula no adesão) e art. 423 (interpretação pró-aderente).<br><br>
   <b>⚠️ Pegadinha:</b> D soa razoável, mas o art. 422 trata de boa-fé objetiva, não de "respeitar as cláusulas".<br><br>
   <b>🧠 Mnemônico:</b> Art. 422 = boa-fé e probidade — não "respeitar cláusulas".<br><br>
   <b>📌 Norma:</b> arts. 422–426 CC | QConcursos Q3811857`},

  {id:'q86', materia:'Vícios redibitórios', tipo:'multipla',
   enunciado:`Carlos, ciente de que o imóvel deveria ser demolido por graves problemas estruturais, vendeu-o a João (R$ 500 mil), que desconhecia a situação. Seis meses após a tradição, João é notificado pela defesa civil. Nesse caso, João:`,
   alternativas:[
    {letra:'A',texto:'só abatimento, sem rescisão/perdas e danos'},
    {letra:'B',texto:'nem rescisão nem perdas e danos (prazo decadencial)'},
    {letra:'C',texto:'sem rescisão (prazo decadencial), mas com reparação de danos'},
    {letra:'D',texto:'rescisão + restituição, mas sem indenização (prazo decadencial)'},
    {letra:'E',texto:'poderá exigir a rescisão e a restituição dos valores pagos, com perdas e danos, ou optar por permanecer com o imóvel e reclamar o abatimento no preço.'}
   ],
   correta:'E',
   comentario:`<b>⚖️ Por quê (E):</b> Defeito oculto que torna o imóvel impróprio é vício redibitório (art. 441). João pode redibir (rescindir e restituir, art. 442) ou pedir abatimento. Como Carlos conhecia o vício e ocultou (má-fé), responde por restituição mais perdas e danos (art. 443). O prazo para imóvel é de 1 ano (art. 445) e só passaram 6 meses — não decaiu.<br><br>
   <b>⚠️ Pegadinha:</b> O "transcurso do prazo decadencial" nas opções B, C e D é a isca: imóvel decai em 1 ano, não em 6 meses; e, sabendo o vendedor do vício, cabem perdas e danos.<br><br>
   <b>🧠 Mnemônico:</b> Imóvel = 1 ano (art. 445); vendedor sabia → também perdas e danos (art. 443).<br><br>
   <b>📌 Norma:</b> arts. 441–445 CC | QConcursos Q3775475`},

  {id:'q87', materia:'Teoria da imprevisão', tipo:'multipla',
   enunciado:`Empresa recreativa obteve empréstimo bancário (carência de 12 meses e 60 prestações) para ampliar seu parque. Uma crise mundial de saúde pública inviabilizou seus serviços. Constitui direito da empresa devedora:`,
   alternativas:[
    {letra:'A',texto:'exigir a suspensão do pagamento das prestações'},
    {letra:'B',texto:'exigir a prorrogação da carência'},
    {letra:'C',texto:'exigir resolução e suspensão das obrigações'},
    {letra:'D',texto:'restituir 50% e pagar a diferença sem juros'},
    {letra:'E',texto:'pedir a resolução do contrato ou a revisão de cláusulas contratuais, dada a sua nova realidade econômica.'}
   ],
   correta:'E',
   comentario:`<b>⚖️ Por quê (E):</b> Contrato de execução continuada mais pandemia (fato extraordinário e imprevisível) que gera onerosidade excessiva é teoria da imprevisão. O devedor pode pedir a resolução (art. 478) ou a revisão das cláusulas (arts. 479 e 317). As demais inventam soluções sem amparo legal.<br><br>
   <b>⚠️ Pegadinha:</b> A banca oferece "saídas" criativas (suspender prestações, prorrogar carência, restituir 50%); só vale resolução ou revisão.<br><br>
   <b>🧠 Mnemônico:</b> Imprevisão = resolução OU revisão (arts. 478–480).<br><br>
   <b>📌 Norma:</b> arts. 478–480 CC | QConcursos Q3775828`},

  {id:'q88', materia:'Interpretação contratual', tipo:'multipla',
   enunciado:`No que diz respeito às cláusulas contratuais em negócio jurídico, as partes:`,
   alternativas:[
    {letra:'A',texto:'podem pactuar regras de interpretação diversas das previstas em lei, nos contratos por instrumento público ou particular'},
    {letra:'B',texto:'podem pactuar somente quando se tratar de bens móveis ou semoventes'},
    {letra:'C',texto:'podem pactuar somente quando o negócio não envolver incapazes'},
    {letra:'D',texto:'não podem pactuar regras de interpretação diversas das previstas em lei'},
    {letra:'E',texto:'podem pactuar somente quando firmado por instrumento público'}
   ],
   correta:'A',
   comentario:`<b>⚖️ Por quê (A):</b> O art. 113, §2º (Lei da Liberdade Econômica — 13.874/2019) permite às partes pactuar livremente regras de interpretação diversas das previstas em lei, sem distinção de forma. As demais enxertam restrições inexistentes (somente móveis, somente sem incapazes, somente público, ou "não podem").<br><br>
   <b>⚠️ Pegadinha:</b> A lei não condiciona a pactuação ao tipo de bem, à ausência de incapazes ou à forma pública.<br><br>
   <b>🧠 Mnemônico:</b> Liberdade Econômica = pactuar interpretação é LIVRE (art. 113, §2º).<br><br>
   <b>📌 Norma:</b> art. 113 §2º CC | QConcursos Q3775825`},

  {id:'q89', materia:'Teoria da imprevisão', tipo:'multipla',
   enunciado:`De acordo com o STJ, aplica-se a teoria da imprevisão quando a onerosidade excessiva decorrer de:`,
   alternativas:[
    {letra:'A',texto:'estiagem em contratos agrícolas'},
    {letra:'B',texto:'pandemia, em relação à empresa de coworking, com drástica redução comprovada do faturamento'},
    {letra:'C',texto:'contratos derivativos quando presentes os riscos e o desequilíbrio econômico-financeiro'},
    {letra:'D',texto:'aumento salarial por dissídio coletivo (contrato administrativo)'},
    {letra:'E',texto:'pragas em contratos agrícolas'}
   ],
   correta:'B',
   comentario:`<b>⚖️ Por quê (B):</b> O STJ só aplica a imprevisão quando o fato é extraordinário e imprevisível. A pandemia, para empresa de coworking com queda comprovada de faturamento, se encaixa. Estiagem e pragas no agronegócio, variação cambial em derivativos e dissídio coletivo são áleas ordinárias — o STJ recusa.<br><br>
   <b>⚠️ Pegadinha:</b> Estiagem e pragas "parecem" imprevisíveis, mas no agronegócio são riscos previsíveis (álea ordinária).<br><br>
   <b>🧠 Mnemônico:</b> Agronegócio e câmbio = álea ordinária; pandemia = extraordinária (STJ).<br><br>
   <b>📌 Norma:</b> art. 478 CC + STJ | QConcursos Q3775035`},

  {id:'q90', materia:'Evicção', tipo:'multipla',
   enunciado:`Segundo o STJ, o evicto tem direito à restituição integral do valor do bem, calculado ao tempo em que:`,
   alternativas:[
    {letra:'A',texto:'realizado o negócio, valor de mercado à celebração'},
    {letra:'B',texto:'dele foi desapossado, considerado o valor do bem apurado no momento da perda sofrida'},
    {letra:'C',texto:'desapossado, mas valor do negócio celebrado'},
    {letra:'D',texto:'desapossado, mas valor de mercado à celebração'},
    {letra:'E',texto:'realizado o negócio, preço à época corrigido'}
   ],
   correta:'B',
   comentario:`<b>⚖️ Por quê (B):</b> O valor a restituir ao evicto é o da coisa na época em que se evenceu (momento do desapossamento), não o do contrato (art. 450, parágrafo único). O STJ confirma. As alternativas C e D usam "valor do negócio" ou "tempo da celebração"; A e E ancoram no tempo do negócio.<br><br>
   <b>⚠️ Pegadinha:</b> Usar o "valor do contrato" ou "tempo da celebração" — o correto é o valor atual da coisa, ao tempo da evicção.<br><br>
   <b>🧠 Mnemônico:</b> Evicção: vale o preço da coisa NA HORA da perda (art. 450, §ún).<br><br>
   <b>📌 Norma:</b> art. 450 §ún CC + STJ | QConcursos Q3775033`},

  {id:'q91', materia:'Emancipação', tipo:'multipla',
   enunciado:`De acordo com o CC, o menor terá sua emancipação legal reconhecida, ficando com ele o ônus de provar essa condição, quando:`,
   alternativas:[
    {letra:'A',texto:'tiver dezesseis anos completos e seus pais concordarem'},
    {letra:'B',texto:'tiver estabelecimento civil ou comercial, ou existência de relação de emprego, desde que, em função deles, o menor com dezesseis anos completos tenha economia própria'},
    {letra:'C',texto:'tiver obtido sentença judicial de emancipação, em virtude de seus méritos morais e intelectuais'},
    {letra:'D',texto:'tiver concluído curso de nível médio técnico em escola reconhecida pelo MEC'},
    {letra:'E',texto:'estiver empregado em empresa familiar de seus ascendentes, a qualquer tempo'}
   ],
   correta:'B',
   comentario:`<b>⚖️ Por quê (B):</b> Transcrição do art. 5º, parágrafo único, V, CC: emancipação pela existência de relação de emprego ou estabelecimento civil/comercial desde que o menor com 16 anos completos tenha economia própria — emancipação LEGAL (independe de autorização dos pais ou juiz).<br><br>
   <b>⚠️ As outras:</b> A confunde com emancipação voluntária (pais + 16 anos); C inventa "méritos morais"; D trata de colação de grau superior; E inventa emprego familiar a qualquer tempo.<br><br>
   <b>🧠 Mnemônico:</b> Emprego com economia própria aos 16 = emancipação LEGAL automática.<br><br>
   <b>📌 Norma:</b> art. 5º §ún V CC | QConcursos Q3673867`},

  {id:'q92', materia:'Herança de pessoa viva', tipo:'multipla',
   enunciado:`Após reconhecer a paternidade, o pai propôs ao filho indenização se ele aceitasse ser excluído da herança (renúncia antecipada ao quinhão na sucessão futura). Houve homologação judicial. Segundo o STJ, a transação é:`,
   alternativas:[
    {letra:'A',texto:'válida — a homologação impede o reconhecimento do vício'},
    {letra:'B',texto:'ineficaz'},
    {letra:'C',texto:'válida — direito disponível'},
    {letra:'D',texto:'nula, pois herança de pessoa viva não pode ser objeto de contrato'},
    {letra:'E',texto:'anulável'}
   ],
   correta:'D',
   comentario:`<b>⚖️ Por quê (D):</b> Renúncia antecipada a quinhão de sucessão ainda não aberta é pacto sobre herança de pessoa viva (pacta corvina), vedado pelo art. 426, gerando nulidade absoluta (art. 166). O STJ confirma que a homologação judicial não convalida a nulidade. "Ineficaz" (B) e "anulável" (E) erram a categoria; A e C dizem "válida".<br><br>
   <b>⚠️ Pegadinha:</b> A homologação judicial não sana a nulidade; e a categoria é NULIDADE, não ineficácia nem anulabilidade.<br><br>
   <b>🧠 Mnemônico:</b> Herança de pessoa viva = NULO (art. 426); homologação não salva.<br><br>

// ── State ──────────────────────────────────────────────────────────────────
const defaultState = () => ({
  respostas: {},
  revisao: {},
  caderno: {},
  revisarDepois: {},
  posicao: 0,
  modo: 'todas',
  materiaFiltro: ''
});

let state = defaultState();

function loadState() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) state = Object.assign(defaultState(), JSON.parse(raw));
  } catch(e) {}
}

function saveState() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch(e) {}
}

// ── Queue ──────────────────────────────────────────────────────────────────
let queue = [];

function today() { return new Date().toISOString().split('T')[0]; }

function buildQueue() {
  const t = today();
  if (state.modo === 'todas') {
    return [...QUESTOES];
  } else if (state.modo === 'revisar') {
    return QUESTOES.filter(x => {
      const r = state.revisao[x.id];
      return r && r.nextDate <= t;
    });
  } else if (state.modo === 'caderno') {
    return QUESTOES.filter(x => state.caderno[x.id] || state.revisarDepois[x.id]);
  } else if (state.modo === 'materia') {
    const m = state.materiaFiltro;
    return m ? QUESTOES.filter(x => x.materia === m) : [...QUESTOES];
  } else if (state.modo === 'aleatorio') {
    return fisherYates([...QUESTOES]);
  }
  return [...QUESTOES];
}

function fisherYates(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function currentQ() { return queue[state.posicao] || null; }

// ── Spaced repetition ─────────────────────────────────────────────────────
function addDays(dateStr, days) {
  const d = new Date(dateStr + 'T12:00:00');
  d.setDate(d.getDate() + days);
  return d.toISOString().split('T')[0];
}

function scheduleQ(id, days) {
  if (!state.revisao[id]) state.revisao[id] = { nextDate: today(), interval: 1, acertos: 0 };
  state.revisao[id].nextDate = addDays(today(), days);
  state.revisao[id].interval = days;
  saveState();
  renderCard();
}

function removeSchedule(id) {
  delete state.revisao[id];
  saveState();
  renderCard();
}

function autoSchedule(id, correct) {
  if (!state.revisao[id]) state.revisao[id] = { nextDate: today(), interval: 1, acertos: 0 };
  const r = state.revisao[id];
  if (correct) {
    r.acertos = (r.acertos || 0) + 1;
    const days = r.acertos === 1 ? 1 : r.acertos === 2 ? 7 : 30;
    r.nextDate = addDays(today(), days);
    r.interval = days;
  } else {
    r.acertos = 0;
    r.nextDate = addDays(today(), 1);
    r.interval = 1;
  }
}

function formatDate(d) {
  const [y, m, day] = d.split('-');
  return day + '/' + m + '/' + y;
}

// ── Stats ──────────────────────────────────────────────────────────────────
function calcStats() {
  const total = QUESTOES.length;
  let acertos = 0, erros = 0, revisadasHoje = 0;
  const t = today();
  for (const q of QUESTOES) {
    const r = state.respostas[q.id];
    if (r) {
      if (r.letra === q.correta) acertos++;
      else erros++;
    }
    const rev = state.revisao[q.id];
    if (rev && rev.nextDate <= t) revisadasHoje++;
  }
  const pendentes = total - acertos - erros;
  const pct = Math.round(((acertos + erros) / total) * 100);
  return { total, acertos, erros, pendentes, revisadasHoje, pct };
}

// ── Timers ─────────────────────────────────────────────────────────────────
let sessionSecs = 0;
let questionSecs = 0;
let paused = false;
let timerInterval = null;

function startTimers() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(function() {
    if (!paused) {
      sessionSecs++;
      questionSecs++;
      updateTimerDisplay();
    }
  }, 1000);
}

function resetQuestionTimer() { questionSecs = 0; }

function fmt(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
}

function updateTimerDisplay() {
  const el = document.getElementById('timerDisplay');
  if (el) el.textContent = '⏱ ' + fmt(questionSecs) + '  |  Sessão: ' + fmt(sessionSecs);
}

function togglePause() {
  paused = !paused;
  const btn = document.getElementById('btnPausar');
  if (btn) btn.textContent = paused ? 'Retomar' : 'Pausar';
}

// ── Render ─────────────────────────────────────────────────────────────────
function renderPlacar() {
  const s = calcStats();
  document.getElementById('placar').innerHTML =
    '<div class="chip verde">' + s.acertos + '<span>Acertos</span></div>' +
    '<div class="chip vermelho">' + s.erros + '<span>Erros</span></div>' +
    '<div class="chip cinza">' + s.pendentes + '<span>Pendentes</span></div>' +
    '<div class="chip roxo">' + s.revisadasHoje + '<span>Revisadas hoje</span></div>';
  document.getElementById('progFill').style.width = s.pct + '%';
}

function renderModos() {
  document.querySelectorAll('.modoBtn').forEach(function(btn) {
    btn.classList.toggle('ativo', btn.dataset.modo === state.modo);
  });
  const sel = document.getElementById('materiaSelect');
  sel.style.display = state.modo === 'materia' ? '' : 'none';
}

function renderCard() {
  const card = document.getElementById('qcard');
  const q = currentQ();
  if (!q) {
    card.innerHTML = '<div class="vazio">Nenhuma questão neste modo. Tente outro filtro.</div>';
    document.getElementById('navCount').textContent = '0 / 0';
    document.getElementById('btnAnterior').disabled = true;
    document.getElementById('btnProxima').disabled = true;
    return;
  }

  const idx = state.posicao;
  const total = queue.length;
  document.getElementById('navCount').textContent = (idx + 1) + ' / ' + total;
  document.getElementById('btnAnterior').disabled = idx === 0;
  document.getElementById('btnProxima').disabled = idx === total - 1;

  const resp = state.respostas[q.id];
  const answered = !!resp;
  const correct = answered && resp.letra === q.correta;
  const rev = state.revisao[q.id];
  const t = today();
  const starred = !!state.revisarDepois[q.id];

  let schedHtml = '';
  if (rev) {
    const overdue = rev.nextDate <= t;
    const cls = overdue ? 'hoje' : 'futuro';
    const label = overdue ? 'revisar hoje ⏰' : 'próx. revisão: ' + formatDate(rev.nextDate);
    schedHtml = '<p class="agendInfo ' + cls + '">📅 ' + label + '</p>';
  } else {
    schedHtml = '<p class="agendInfo">Sem agendamento.</p>';
  }

  let optsHtml = '';
  q.alternativas.forEach(function(alt) {
    let cls = '';
    if (answered) {
      if (alt.letra === q.correta) cls = ' correta';
      else if (resp.letra === alt.letra && alt.letra !== q.correta) cls = ' errada';
    }
    const checked = (answered && resp.letra === alt.letra) ? ' checked' : '';
    const disabled = answered ? ' disabled' : '';
    optsHtml += '<label class="opt' + cls + '" id="opt_' + alt.letra + '">' +
      '<input type="radio" name="resp_' + q.id + '" value="' + alt.letra + '"' + checked + disabled + '>' +
      '<span><b>' + alt.letra + ')</b> ' + alt.texto + '</span>' +
      '</label>';
  });

  let resultadoHtml = '';
  if (answered) {
    const cls2 = correct ? 'certo' : 'errado';
    const msg = correct ? '✓ Correto!' : '✗ Errado! Você marcou: ' + resp.letra;
    resultadoHtml = '<div class="resultado ' + cls2 + '" style="display:block">' + msg + '</div>' +
      '<div class="gabarito" style="display:block">Gabarito: <b>' + q.correta + '</b></div>' +
      '<details class="coment" style="display:block"><summary>Ver explicação</summary>' +
      '<div class="comentBody">' + q.comentario + '</div></details>' +
      '<div class="agendamento" style="display:block">' + schedHtml +
      '<div class="agendBtns">' +
      '<button onclick="scheduleQ(\'' + q.id + '\',1)">1 dia</button>' +
      '<button onclick="scheduleQ(\'' + q.id + '\',7)">7 dias</button>' +
      '<button onclick="scheduleQ(\'' + q.id + '\',30)">30 dias</button>' +
      '<button class="remover" onclick="removeSchedule(\'' + q.id + '\')">remover</button>' +
      '</div></div>' +
      '<button class="starBtn' + (starred ? ' ativo' : '') + '" style="display:block" onclick="toggleStar(\'' + q.id + '\')">' +
      (starred ? '⭐ No caderno' : '☆ Revisar depois') + '</button>';
  } else {
    resultadoHtml = '<button id="btnConfirmar" onclick="confirmar()" disabled>Confirmar</button>' +
      '<button class="starBtn' + (starred ? ' ativo' : '') + '" style="display:block;margin-top:10px" onclick="toggleStar(\'' + q.id + '\')">' +
      (starred ? '⭐ No caderno' : '☆ Revisar depois') + '</button>';
  }

  card.innerHTML =
    '<div class="qnum">' +
    '<span>Q' + (idx + 1) + ' de ' + total + ' — ID: ' + q.id.toUpperCase() + '</span>' +
    '<span class="materia-tag">' + q.materia + '</span>' +
    '</div>' +
    '<div class="qenunc">' + q.enunciado + '</div>' +
    '<div class="opts" id="opts">' + optsHtml + '</div>' +
    resultadoHtml;

  if (!answered) {
    card.querySelectorAll('input[type=radio]').forEach(function(r) {
      r.addEventListener('change', function() {
        document.getElementById('btnConfirmar').disabled = false;
        card.querySelectorAll('.opt').forEach(function(o) { o.classList.remove('selecionada'); });
        r.closest('.opt').classList.add('selecionada');
      });
    });
  }
}

function confirmar() {
  const q = currentQ();
  if (!q) return;
  const sel = document.querySelector('input[name="resp_' + q.id + '"]:checked');
  if (!sel) return;
  const letra = sel.value;
  const correct = letra === q.correta;

  state.respostas[q.id] = { letra: letra, data: today() };
  autoSchedule(q.id, correct);

  if (!correct) {
    state.caderno[q.id] = true;
  }

  saveState();
  renderPlacar();
  renderCard();
}

function navegar(dir) {
  const newPos = state.posicao + dir;
  if (newPos < 0 || newPos >= queue.length) return;
  state.posicao = newPos;
  saveState();
  resetQuestionTimer();
  renderCard();
}

function toggleStar(id) {
  if (state.revisarDepois[id]) {
    delete state.revisarDepois[id];
  } else {
    state.revisarDepois[id] = true;
  }
  saveState();
  renderCard();
}

function setModo(modo) {
  state.modo = modo;
  state.posicao = 0;
  saveState();
  rebuild();
}

function rebuild() {
  queue = buildQueue();
  if (state.posicao >= queue.length) state.posicao = 0;
  renderModos();
  renderPlacar();
  renderCard();
}

// ── Init materia select ────────────────────────────────────────────────────
function initMateriaSelect() {
  const sel = document.getElementById('materiaSelect');
  const materias = [];
  QUESTOES.forEach(function(q) {
    if (materias.indexOf(q.materia) === -1) materias.push(q.materia);
  });
  let opts = '<option value="">— todas as matérias —</option>';
  materias.forEach(function(m) {
    opts += '<option value="' + m + '"' + (state.materiaFiltro === m ? ' selected' : '') + '>' + m + '</option>';
  });
  sel.innerHTML = opts;
  sel.addEventListener('change', function() {
    state.materiaFiltro = sel.value;
    state.posicao = 0;
    saveState();
    rebuild();
  });
}

// ── Mode buttons ────────────────────────────────────────────────────────────
document.getElementById('modos').addEventListener('click', function(e) {
  const btn = e.target.closest('.modoBtn');
  if (!btn) return;
  setModo(btn.dataset.modo);
});

// ── Recomeçar ───────────────────────────────────────────────────────────────
function recomecar() {
  if (!confirm('Tem certeza? Todo o progresso, agendamentos e caderno de erros serão apagados.')) return;
  localStorage.removeItem(STORE_KEY);
  location.reload();
}

// ── Export ──────────────────────────────────────────────────────────────────
function exportarProgresso() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'progresso_q84_q98_' + today() + '.json';
  a.click();
  setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
}

// ── Import ──────────────────────────────────────────────────────────────────
function importarProgresso(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      state = Object.assign(defaultState(), imported);
      saveState();
      rebuild();
      alert('Progresso importado com sucesso!');
    } catch(err) {
      alert('Arquivo inválido. Verifique se é um JSON de progresso exportado daqui.');
    }
  };
  reader.readAsText(file);
  evt.target.value = '';
}

// ── iFrame banner ────────────────────────────────────────────────────────────
function dismissIframe() {
  const el = document.getElementById('iframeBanner');
  if (el) el.style.display = 'none';
  sessionStorage.setItem('iframeDismissed', '1');
}

function checkIframeBanner() {
  if (sessionStorage.getItem('iframeDismissed') === '1') {
    const el = document.getElementById('iframeBanner');
    if (el) el.style.display = 'none';
  }
}

// ── Boot ─────────────────────────────────────────────────────────────────────
loadState();
checkIframeBanner();
initMateriaSelect();
queue = buildQueue();
if (state.posicao >= queue.length) state.posicao = 0;
renderModos();
renderPlacar();
renderCard();
startTimers();
</script>
</body>
</html>
